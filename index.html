<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; overflow-x:hidden; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn {
  from { opacity:0; transform:scale(.95); }
  to { opacity:1; transform:scale(1); }
}
.sidebarBtn { width:100%; text-align:left; padding:.75rem 1rem; border-radius:.75rem; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.sidebarBtn:hover { background:#fee2e2; color:#b91c1c; }

@media (min-width: 1024px) {
  .system-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .system-card:hover { 
    transform: translateY(-8px); 
    box-shadow: 0 20px 25px -5px rgba(220, 38, 38, 0.1), 0 10px 10px -5px rgba(220, 38, 38, 0.04);
    border-color: #ef4444;
  }
}

.toast-in { animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@media (max-width: 1023px) {
  .mobile-header-group {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 40;
    background: white;
  }
  .content-spacer {
    margin-top: 180px; 
  }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = "https://bbgcsddwzcrxwzczrojf.supabase.co";
const SB_KEY = "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

/* AUTH */
function Auth({ onAuth }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [showPass, setShowPass]=useState(false);
  const [mode,setMode]=useState("login");
  const [msg,setMsg]=useState("");

  async function submit(){
    try {
      setMsg("");
      if(mode==="signup"){
        const {data, error} = await supabase.auth.signUp({email,password:pass});
        if(error) throw error;
        
        if (data?.user?.identities?.length === 0) {
          setMsg("User already exists with this email.");
          return;
        }

        setMsg("Account created. Login now.");
        setMode("login");
      } else {
        const {data, error}=await supabase.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
        onAuth(data.user);
      }
    } catch(e) { 
      if (e.message.includes("already registered")) {
        setMsg("User already exists.");
      } else {
        setMsg(e.message); 
      }
    }
  }

  return (
    <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
      <div className="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl fade-in">
        <h1 className="text-2xl font-bold text-center text-red-600 uppercase tracking-tighter">STS QAQC</h1>
        <input className="w-full border p-3 rounded-xl mt-4 focus:ring-2 focus:ring-red-500 outline-none" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <div className="relative mt-2">
          <input type={showPass ? "text" : "password"} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-red-500 outline-none" placeholder="Password" onChange={e=>setPass(e.target.value)} />
          <button type="button" onClick={()=>setShowPass(!showPass)} className="absolute right-4 top-1/2 -translate-y-1/2 text-xl opacity-50 hover:opacity-100 transition-opacity">
              {showPass ? "👁️" : "🙈"}
          </button>
        </div>
        {msg && <p className="text-sm text-center mt-2 text-red-600 font-bold">{msg}</p>}
        <button onClick={submit} className="w-full bg-red-600 text-white p-3 rounded-xl mt-4 font-bold hover:bg-red-700 transition">
          {mode==="login"?"Login":"Create Account"}
        </button>
      </div>
    </div>
  );
}

/* DASHBOARD */
function Dashboard({ user }) {
  // CHANGE THESE EMAILS TO THE ONES YOU WANT TO HAVE DELETE ACCESS
  const ALLOWED_ADMINS = ["yarolka@stsgroup.ie", "ameno@stsgroup.ie"];

  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [photoComments, setPhotoComments] = useState({});
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast, setToast] = useState(null);
  const [confirmData, setConfirmData] = useState(null);
  const [isListening, setIsListening] = useState(false);
  const [recentActivity, setRecentActivity] = useState([]);

  useEffect(()=>{ 
    loadSystems(); 
    loadActivity();
  },[]);

  const notify = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    setSystems(data||[]);
  }

  async function loadActivity() {
    const {data} = await supabase.from("activity_logs").select("*").order("timestamp", {ascending: false}).limit(5);
    setRecentActivity(data || []);
  }

  async function logActivity(sysId) {
    await supabase.from("activity_logs").insert([{ system_id: sysId, user_email: user.email }]);
    loadActivity();
  }

  async function loadPhotos(id){
    const {data}=await supabase.storage.from("photos").list(id);
    if(!data){ setPhotos([]); return; }
    setPhotos(data.map(f=>{
      const parts=f.name.split("_");
      return {
        name:f.name,
        uploader:parts[1],
        timestamp:new Date(parseInt(parts[0])).toLocaleString(),
        url:supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`).data.publicUrl
      };
    }));
  }

  useEffect(()=>{
    if(active){
      setNotes(active.notes||"");
      setPhotoComments(active.photo_comments || {});
      loadPhotos(active.id);
    }
  },[active]);

  const handleBulkImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (event) => {
      const text = event.target.result;
      const rows = text.split('\n').slice(1);
      const toInsert = rows.map(row => {
        const [id, description] = row.split(',');
        if (id && id.trim()) {
           return { id: id.trim(), description: description?.trim() || "", notes: "", status: "not_completed", photo_comments: {} };
        }
        return null;
      }).filter(x => x !== null);

      if (toInsert.length > 0) {
        const { error } = await supabase.from("systems").insert(toInsert);
        if (error) notify("Import failed: " + error.message, "delete");
        else {
          notify(`${toInsert.length} systems imported!`);
          loadSystems();
        }
      }
    };
    reader.readAsText(file);
  };

  const startListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("Your browser does not support voice recognition.");
      return;
    }
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onstart = () => setIsListening(true);
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      setNotes(prev => prev + (prev ? " " : "") + transcript);
    };
    recognition.onend = () => setIsListening(false);
    recognition.start();
  };

  const generatePDF = async () => {
    if (active.status !== "completed") return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let yPos = 20;

    doc.setFillColor(220, 38, 38);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setFontSize(24);
    doc.setTextColor(255, 255, 255);
    doc.text("STS QAQC REPORT", 20, 28);
    yPos = 55;
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    doc.text(`SYSTEM ID:`, 20, yPos);
    doc.setFont(undefined, 'bold');
    doc.text(`${active.id}`, 50, yPos);
    yPos += 7;
    doc.setFont(undefined, 'normal');
    doc.text(`INSPECTOR:`, 20, yPos);
    doc.text(`${user.email}`, 50, yPos);
    yPos += 7;
    doc.text(`DATE:`, 20, yPos);
    doc.text(`${new Date().toLocaleString()}`, 50, yPos);
    yPos += 15;
    doc.setDrawColor(220, 38, 38);
    doc.setLineWidth(1);
    doc.line(20, yPos, 190, yPos);
    yPos += 12;
    doc.setFontSize(14);
    doc.setTextColor(220, 38, 38);
    doc.text("INSPECTION NOTES", 20, yPos);
    yPos += 8;
    doc.setFontSize(11);
    doc.setTextColor(40, 40, 40);
    doc.setFont(undefined, 'normal');
    const splitNotes = doc.splitTextToSize(notes || "No notes provided.", 170);
    doc.text(splitNotes, 20, yPos);
    yPos += (splitNotes.length * 7) + 10;

    if (photos.length > 0) {
      doc.setFontSize(14);
      doc.setTextColor(220, 38, 38);
      doc.text("ATTACHED PHOTOS", 20, yPos);
      yPos += 10;
      for (const [index, photo] of photos.entries()) {
        if (yPos > 240) {
          doc.addPage();
          yPos = 20;
        }
        try {
          const img = new Image();
          img.src = photo.url;
          await new Promise((resolve) => { img.onload = resolve; });
          const xPos = (index % 2 === 0) ? 20 : 110;
          doc.addImage(img, 'JPEG', xPos, yPos, 80, 60);
          doc.setFontSize(8);
          doc.text(`Uploaded by: ${photo.uploader}`, xPos, yPos + 65);
          
          const comment = photoComments[photo.name];
          if(comment) {
            const splitComment = doc.splitTextToSize(comment, 80);
            doc.text(splitComment, xPos, yPos + 70);
          }

          if (index % 2 !== 0) yPos += 85; 
          else if (index === photos.length - 1) yPos += 85;
        } catch (e) {
          console.error("Image failed to load for PDF", e);
        }
      }
    }
    doc.save(`STS_Report_${active.id}.pdf`);
    notify("PDF Generated!");
  };

  async function save(){
    const input=document.getElementById("file-upload");
    if(input.files.length){
      for(const f of input.files){
        const path=`${active.id}/${Date.now()}_${user.email}_${f.name}`;
        await supabase.storage.from("photos").upload(path,f);
      }
    }
    const hasContent = notes.trim() || photos.length || input.files.length;
    
    const { error } = await supabase.from("systems")
      .update({ 
        notes, 
        status: hasContent ? "completed" : "not_completed",
        photo_comments: photoComments 
      })
      .eq("id", active.id);

    if (error) {
      notify("Save failed: " + error.message, "delete");
    } else {
      await logActivity(active.id);
      notify("System saved successfully!");
      setActive(null);
      loadSystems();
    }
  }

  const handleDeletePhoto = (photo) => {
    if (!ALLOWED_ADMINS.includes(user.email)) {
      notify("You don't have access to delete", "delete");
      return;
    }
    setConfirmData({
      title: "Delete Photo?",
      msg: "This image will be permanently removed.",
      onConfirm: async () => {
        await supabase.storage.from("photos").remove([`${active.id}/${photo.name}`]);
        
        const newComments = { ...photoComments };
        delete newComments[photo.name];
        
        await supabase.from("systems")
          .update({ photo_comments: newComments })
          .eq("id", active.id);

        setPhotoComments(newComments);
        await loadPhotos(active.id);
        notify("Photo deleted", "delete");
        setConfirmData(null);
      }
    });
  };

  async function createSystem(){
    if(!newId.trim()) return;
    
    const { data: existing } = await supabase.from("systems").select("id").eq("id", newId.trim()).maybeSingle();
    if (existing) {
        notify("System ID already exists!", "delete");
        return;
    }

    await supabase.from("systems").insert([{
      id:newId.trim(),
      description:desc,
      notes:"",
      status:"not_completed",
      photo_comments: {}
    }]);
    setShowAdd(false); setNewId(""); setDesc(""); loadSystems();
    notify("New system added!");
  }

  async function updateSystem() {
    if(!editTarget.id.trim()) return;

    if (editTarget.id !== editTarget.originalId) {
        const { data: files } = await supabase.storage.from("photos").list(editTarget.originalId);
        if (files && files.length > 0) {
            for (const file of files) {
                await supabase.storage.from("photos").copy(
                    `${editTarget.originalId}/${file.name}`,
                    `${editTarget.id}/${file.name}`
                );
                await supabase.storage.from("photos").remove([`${editTarget.originalId}/${file.name}`]);
            }
        }
    }

    await supabase.from("systems")
      .update({ id: editTarget.id, description: editTarget.description })
      .eq("id", editTarget.originalId);
    
    await logActivity(editTarget.id);
    setEditTarget(null);
    loadSystems();
    notify("System updated!");
  }

  const handleDeleteSystem = () => {
    if (!ALLOWED_ADMINS.includes(user.email)) {
      notify("You don't have access to delete", "delete");
      return;
    }
    if (editTarget.status === "completed") {
      notify("Cannot delete completed system!", "delete");
      return;
    }
    setConfirmData({
      title: "Delete System?",
      msg: `Delete system ${editTarget.originalId}? All data will be lost.`,
      onConfirm: async () => {
        await supabase.from("systems").delete().eq("id", editTarget.originalId);
        setEditTarget(null);
        loadSystems();
        notify("System deleted", "delete");
        setConfirmData(null);
      }
    });
  };

  const forceDownload = async (url, filename) => {
    const res = await fetch(url);
    const blob = await res.blob();
    const blobUrl = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  };

  const filtered = systems.filter(s =>
    (s.id.toLowerCase().includes(search.toLowerCase()) || 
     s.description.toLowerCase().includes(search.toLowerCase())) &&
    (filter==="all" || s.status===filter)
  );

  return (
    <div className="flex h-screen overflow-hidden bg-white">
      
      {toast && (
        <div className={`fixed top-5 right-5 z-[100] p-4 rounded-2xl shadow-2xl flex items-center gap-3 toast-in text-white font-bold
          ${toast.type === 'delete' ? 'bg-orange-500' : 'bg-green-600'}`}>
          <span>{toast.type === 'delete' ? '⚠️' : '🚀'}</span>
          {toast.msg}
        </div>
      )}

      {confirmData && (
        <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
          <div className="bg-white p-8 rounded-3xl w-full max-w-xs shadow-2xl fade-in text-center">
            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">⚠️</div>
            <h2 className="text-xl font-bold mb-2">{confirmData.title}</h2>
            <p className="text-sm text-gray-500 mb-6">{confirmData.msg}</p>
            <div className="flex flex-col gap-2">
              <button onClick={confirmData.onConfirm} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold hover:bg-red-700 transition">Yes, Delete</button>
              <button onClick={() => setConfirmData(null)} className="w-full bg-gray-100 text-gray-700 py-3 rounded-2xl font-bold hover:bg-gray-200 transition">Cancel</button>
            </div>
          </div>
        </div>
      )}

      <div className="mobile-header-group">
        <div className="lg:hidden flex justify-between items-center p-6 border-b-2">
          <h1 className="font-black text-2xl text-red-600 tracking-tight">STS QAQC</h1>
          <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="text-3xl p-2 -mr-2">☰</button>
        </div>
        <div className="lg:hidden px-6 py-4 bg-white border-b">
           <div className="relative">
            <input className="w-full border-2 p-3 pr-10 rounded-2xl shadow-sm focus:ring-2 focus:ring-red-500 outline-none transition-all"
              placeholder="Search system..."
              value={search}
              onChange={e=>setSearch(e.target.value)} />
            {search && (
              <button onClick={() => setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 text-xs">✕</button>
            )}
          </div>
        </div>
      </div>

      <div className={`${sidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 fixed lg:relative z-50 w-72 h-full bg-white border-r p-6 transition-transform duration-300 flex flex-col`}>
        <h1 className="text-2xl font-bold text-red-600 mb-2">STS QAQC</h1>
        <p className="text-xs text-gray-500 break-all mb-4">{user.email}</p>
        
        <div className="space-y-3 mb-6">
          <button onClick={()=>setShowAdd(true)} className="bg-red-600 text-white py-3 rounded-2xl font-semibold w-full hover:bg-red-700 shadow-md transition">+ Add System</button>
          
          <label className="hidden lg:flex items-center justify-center bg-gray-100 text-gray-700 py-3 rounded-2xl font-semibold w-full cursor-pointer hover:bg-gray-200 transition">
              📁 Bulk Import (CSV)
              <input type="file" accept=".csv" className="hidden" onChange={handleBulkImport} />
          </label>
        </div>

        <div className="flex flex-col gap-2 mb-6">
          <button onClick={()=>{setFilter("all"); setSidebarOpen(false);}} className="sidebarBtn"><span>🏗️</span> All Systems</button>
          <button onClick={()=>{setFilter("completed"); setSidebarOpen(false);}} className="sidebarBtn"><span>🏆</span> Completed</button>
          <button onClick={()=>{setFilter("not_completed"); setSidebarOpen(false);}} className="sidebarBtn"><span>🚧</span> Not Completed</button>
        </div>

        <div className="mt-4 flex-1 overflow-y-auto">
          <h2 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Recent Activity</h2>
          <div className="space-y-3">
            {recentActivity.map(act => (
              <div key={act.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100">
                <p className="text-xs font-bold text-red-600">Updated: {act.system_id}</p>
                <p className="text-[10px] text-gray-500 truncate">{act.user_email}</p>
              </div>
            ))}
            {recentActivity.length === 0 && <p className="text-xs text-gray-400 italic">No recent updates</p>}
          </div>
        </div>

        <button onClick={()=>supabase.auth.signOut()} className="mt-6 w-full py-3 border text-red-600 rounded-xl font-bold hover:bg-red-50 transition">Logout</button>
      </div>

      <div className="flex-1 p-6 lg:p-10 overflow-y-auto content-spacer lg:mt-0">
        <div className="hidden lg:block relative mb-6">
          <input className="w-full border-2 p-4 pr-12 rounded-2xl shadow-sm focus:ring-2 focus:ring-red-500 outline-none transition-all"
            placeholder="Search system number or description..."
            value={search}
            onChange={e=>setSearch(e.target.value)} />
          {search && (
            <button onClick={() => setSearch("")} className="absolute right-4 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-red-100 hover:text-red-600 transition-colors">✕</button>
          )}
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          {filtered.map(s=>(
            <div key={s.id} className="relative group fade-in">
              <div onClick={()=>setActive(s)}
                className={`system-card cursor-pointer p-8 rounded-3xl border shadow-sm h-full transition-all
                ${s.status==="completed"?"bg-green-50 border-green-200":"bg-white border-slate-200"}`}>
                <h3 className="font-bold text-xl">{s.id}</h3>
                <p className="text-sm text-gray-600 mt-2">{s.description}</p>
              </div>
              <button onClick={(e) => { e.stopPropagation(); setEditTarget({ ...s, originalId: s.id }); }}
                className="absolute top-4 right-4 p-2 bg-white/90 border shadow-sm rounded-full text-gray-500 hover:text-red-600 hover:border-red-200 transition-all active:scale-95 lg:opacity-0 lg:group-hover:opacity-100">
                <span>✏️</span>
              </button>
            </div>
          ))}
        </div>
      </div>

      <button onClick={()=>setShowAdd(true)} className="lg:hidden fixed bottom-6 right-6 w-16 h-16 bg-red-600 text-white rounded-full shadow-2xl text-3xl font-bold flex items-center justify-center z-30 active:scale-90 transition-transform">
        +
      </button>

      {active && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[60] backdrop-blur-sm">
          <div className="bg-white w-full max-w-3xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] fade-in">
            <div className="bg-red-600 text-white p-6 rounded-t-3xl flex justify-between items-center">
                <h2 className="text-xl font-bold">{active.id}</h2>
                <button 
                  disabled={active.status !== "completed"}
                  onClick={generatePDF} 
                  className={`px-4 py-1.5 rounded-xl text-xs font-black transition ${active.status === "completed" ? "bg-white text-red-600 hover:bg-red-50" : "bg-gray-300 text-gray-500 cursor-not-allowed opacity-70"}`}>
                  EXPORT PDF
                </button>
            </div>
            <div className="p-6 overflow-y-auto space-y-4 flex-1">
              <div className="relative">
                <textarea value={notes} onChange={e=>setNotes(e.target.value)}
                    className="w-full border p-4 rounded-2xl h-32 focus:ring-2 focus:ring-red-500 outline-none" placeholder="Inspection notes..." />
                <button onClick={startListening} 
                    className={`absolute bottom-3 right-3 p-3 rounded-full shadow-md transition ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}>
                    {isListening ? "⏹️" : "🎤"}
                </button>
              </div>
              <div className="border-2 border-dashed border-gray-200 p-4 rounded-2xl">
                <p className="text-sm font-semibold mb-2">Upload Photos</p>
                <input id="file-upload" type="file" multiple className="text-sm" />
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {photos.map(p=>(
                  <div key={p.name} className="border rounded-2xl p-3 bg-slate-50">
                    <a href={p.url} target="_blank" rel="noopener noreferrer">
                        <img src={p.url} className="rounded-lg mb-2 cursor-pointer hover:opacity-80 transition object-cover w-full h-40 shadow-sm" alt="Preview"/>
                    </a>
                    <p className="text-[10px] text-gray-400 font-mono">{p.timestamp}</p>
                    <p className="text-xs font-semibold truncate">{p.uploader}</p>
                    
                    <textarea 
                      className="w-full mt-2 border p-2 rounded-lg text-xs outline-none focus:ring-1 focus:ring-red-500" 
                      placeholder="Add comment to this photo..."
                      value={photoComments[p.name] || ""}
                      onChange={e => setPhotoComments({...photoComments, [p.name]: e.target.value})}
                    />

                    <div className="flex gap-2 mt-3">
                      <button onClick={() => forceDownload(p.url, p.name)} className="flex-1 bg-red-500 text-white text-xs py-2 rounded-lg text-center font-bold hover:bg-red-600 transition">Download</button>
                      <button onClick={()=>handleDeletePhoto(p)} className="flex-1 bg-gray-200 text-gray-700 text-xs py-2 rounded-lg font-bold hover:bg-gray-300 transition">Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="p-6 border-t flex gap-3">
              <button onClick={()=>setActive(null)} className="flex-1 py-3 bg-gray-100 rounded-2xl hover:bg-gray-200 transition">Close</button>
              <button onClick={save} className="flex-1 py-3 bg-red-600 text-white rounded-2xl font-bold hover:bg-red-700 shadow-lg transition">Save & Complete</button>
            </div>
          </div>
        </div>
      )}

      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-4 backdrop-blur-sm">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl fade-in">
            <h2 className="text-xl font-bold mb-4 text-center">New System</h2>
            <input className="w-full border p-4 rounded-2xl mb-3 text-center font-bold outline-none focus:ring-2 focus:ring-red-500" placeholder="System Number" value={newId} onChange={e=>setNewId(e.target.value)} />
            <input className="w-full border p-4 rounded-2xl mb-6 text-center outline-none focus:ring-2 focus:ring-red-500" placeholder="Description" value={desc} onChange={e=>setDesc(e.target.value)} />
            <div className="flex gap-2">
                <button onClick={()=>setShowAdd(false)} className="flex-1 bg-gray-100 py-3 rounded-2xl hover:bg-gray-200 transition">Cancel</button>
                <button onClick={createSystem} className="flex-1 bg-red-600 text-white py-3 rounded-2xl font-bold hover:bg-red-700 transition">Add</button>
            </div>
          </div>
        </div>
      )}

      {editTarget && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-4 backdrop-blur-sm">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl fade-in">
            <h2 className="text-xl font-bold mb-4 text-center text-red-600 uppercase">Edit System</h2>
            <p className="text-[10px] text-center text-gray-400 mb-2 uppercase tracking-widest">Editing: {editTarget.originalId}</p>
            <input className="w-full border p-4 rounded-2xl mb-3 text-center font-bold outline-none focus:ring-2 focus:ring-red-500" placeholder="System Number" value={editTarget.id} onChange={e=>setEditTarget({...editTarget, id: e.target.value})} />
            <input className="w-full border p-4 rounded-2xl mb-6 text-center outline-none focus:ring-2 focus:ring-red-500" placeholder="Description" value={editTarget.description} onChange={e=>setEditTarget({...editTarget, description: e.target.value})} />
            <div className="space-y-3">
                <button onClick={updateSystem} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold hover:bg-red-700 transition">Update System</button>
                <button onClick={handleDeleteSystem} className="w-full bg-red-50 text-red-600 py-3 rounded-2xl font-bold hover:bg-red-100 transition">Delete System</button>
                <button onClick={()=>setEditTarget(null)} className="w-full text-gray-500 py-2 text-sm hover:underline">Cancel</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return () => subscription.unsubscribe();
  },[]);
  return user?<Dashboard user={user}/>:<Auth onAuth={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
