<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; overflow-x:hidden; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn {
  from { opacity:0; transform:scale(.95); }
  to { opacity:1; transform:scale(1); }
}
.sidebarBtn { width:100%; text-align:left; padding:.75rem 1rem; border-radius:.75rem; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.sidebarBtn:hover { background:#fee2e2; color:#b91c1c; }

@media (min-width: 1024px) {
  .system-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .system-card:hover { 
    transform: translateY(-8px); 
    box-shadow: 0 20px 25px -5px rgba(220, 38, 38, 0.1), 0 10px 10px -5px rgba(220, 38, 38, 0.04);
    border-color: #ef4444;
  }
}

.toast-in { animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Mobile Sticky Header Fix */
@media (max-width: 1023px) {
  .mobile-header-group {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 40;
    background: white;
  }
  .content-spacer {
    margin-top: 180px; 
  }
}

/* Pulse Animation for Notification */
.pulse-red {
  box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7);
  animation: pulse-red 2s infinite;
}
@keyframes pulse-red {
  0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
  70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
  100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = "https://bbgcsddwzcrxwzczrojf.supabase.co";
const SB_KEY = "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

function Auth({ onAuth }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [showPass, setShowPass]=useState(false);
  const [mode,setMode]=useState("login");
  const [msg,setMsg]=useState("");

  async function submit(){
    try {
      if(mode==="signup"){
        await supabase.auth.signUp({email,password:pass});
        setMsg("Account created. Login now.");
        setMode("login");
      } else {
        const {data, error}=await supabase.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
        onAuth(data.user);
      }
    } catch(e) { setMsg(e.message); }
  }

  return (
    <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
      <div className="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl fade-in">
        <h1 className="text-2xl font-bold text-center text-red-600 uppercase tracking-tighter">STS QAQC</h1>
        <input className="w-full border p-3 rounded-xl mt-4 focus:ring-2 focus:ring-red-500 outline-none" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <div className="relative mt-2">
          <input type={showPass ? "text" : "password"} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-red-500 outline-none" placeholder="Password" onChange={e=>setPass(e.target.value)} />
          <button type="button" onClick={()=>setShowPass(!showPass)} className="absolute right-4 top-1/2 -translate-y-1/2 text-xl opacity-50 hover:opacity-100 transition-opacity">
              {showPass ? "👁️" : "🙈"}
          </button>
        </div>
        {msg && <p className="text-sm text-center mt-2 text-red-600 font-bold">{msg}</p>}
        <button onClick={submit} className="w-full bg-red-600 text-white p-3 rounded-xl mt-4 font-bold hover:bg-red-700 transition">
          {mode==="login"?"Login":"Create Account"}
        </button>
        <button onClick={()=>setMode(mode==="login"?"signup":"login")} className="w-full text-sm text-red-600 mt-2 font-medium">
          {mode==="login"?"Create Account":"Back to Login"}
        </button>
      </div>
    </div>
  );
}

function Dashboard({ user }) {
  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast, setToast] = useState(null);
  const [confirmData, setConfirmData] = useState(null);
  const [isListening, setIsListening] = useState(false);

  useEffect(()=>{ loadSystems(); },[]);

  const notify = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    setSystems(data||[]);
  }

  async function loadPhotos(id){
    const {data}=await supabase.storage.from("photos").list(id);
    if(!data){ setPhotos([]); return; }
    setPhotos(data.map(f=>{
      const parts=f.name.split("_");
      return {
        name:f.name,
        uploader:parts[1],
        timestamp:new Date(parseInt(parts[0])).toLocaleString(),
        url:supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`).data.publicUrl
      };
    }));
  }

  useEffect(()=>{
    if(active){
      setNotes(active.notes||"");
      loadPhotos(active.id);
    }
  },[active]);

  const setUpdateTrigger = async () => {
    if (active && active.status === "completed") {
      await supabase.from("systems").update({ has_updates: true }).eq("id", active.id);
      loadSystems();
    }
  };

  const handleBulkImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (event) => {
      const text = event.target.result;
      const rows = text.split('\n').slice(1);
      const toInsert = rows.map(row => {
        const [id, description] = row.split(',');
        if (id && id.trim()) {
           return { id: id.trim(), description: description?.trim() || "", notes: "", status: "not_completed", has_updates: false };
        }
        return null;
      }).filter(x => x !== null);

      if (toInsert.length > 0) {
        const { error } = await supabase.from("systems").insert(toInsert);
        if (error) notify("Import failed: " + error.message, "delete");
        else {
          notify(`${toInsert.length} systems imported!`);
          loadSystems();
        }
      }
    };
    reader.readAsText(file);
  };

  const startListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onstart = () => setIsListening(true);
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      setNotes(prev => prev + (prev ? " " : "") + transcript);
      setUpdateTrigger();
    };
    recognition.onend = () => setIsListening(false);
    recognition.start();
  };

  const generatePDF = async () => {
    if (active.status !== "completed") return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let yPos = 20;
    doc.setFillColor(220, 38, 38);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setFontSize(24);
    doc.setTextColor(255, 255, 255);
    doc.text("STS QAQC REPORT", 20, 28);
    yPos = 55;
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    doc.text(`SYSTEM ID: ${active.id}`, 20, yPos);
    yPos += 15;
    const splitNotes = doc.splitTextToSize(notes || "No notes provided.", 170);
    doc.text(splitNotes, 20, yPos);
    doc.save(`STS_Report_${active.id}.pdf`);
    notify("PDF Generated!");
  };

  async function save(){
    const input=document.getElementById("file-upload");
    if(input.files.length){
      for(const f of input.files){
        const path=`${active.id}/${Date.now()}_${user.email}_${f.name}`;
        await supabase.storage.from("photos").upload(path,f);
      }
    }
    const hasContent = notes.trim() || photos.length || input.files.length;
    await supabase.from("systems")
      .update({ notes, status: hasContent ? "completed" : "not_completed", has_updates: false })
      .eq("id",active.id);
    notify("System saved successfully!");
    setActive(null);
    loadSystems();
  }

  async function createSystem(){
    if(!newId.trim()) return;
    await supabase.from("systems").insert([{
      id:newId.trim(),
      description:desc,
      notes:"",
      status:"not_completed",
      has_updates: false
    }]);
    setShowAdd(false); setNewId(""); setDesc(""); loadSystems();
    notify("New system added!");
  }

  async function updateSystem() {
    await supabase.from("systems").update({ id: editTarget.id, description: editTarget.description }).eq("id", editTarget.originalId);
    setEditTarget(null); loadSystems(); notify("System updated!");
  }

  const filtered = systems.filter(s =>
    (s.id.toLowerCase().includes(search.toLowerCase()) || 
     s.description.toLowerCase().includes(search.toLowerCase())) &&
    (filter==="all" || s.status===filter)
  );

  return (
    <div className="flex h-screen overflow-hidden bg-white">
      {toast && <div className={`fixed top-5 right-5 z-[100] p-4 rounded-2xl shadow-2xl text-white font-bold toast-in ${toast.type === 'delete' ? 'bg-orange-500' : 'bg-green-600'}`}>{toast.msg}</div>}
      
      {confirmData && (
        <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-3xl w-full max-w-xs shadow-2xl text-center">
            <h2 className="text-xl font-bold mb-6">{confirmData.title}</h2>
            <button onClick={confirmData.onConfirm} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold mb-2">Confirm</button>
            <button onClick={() => setConfirmData(null)} className="w-full bg-gray-100 py-3 rounded-2xl font-bold">Cancel</button>
          </div>
        </div>
      )}

      {/* MOBILE HEADER */}
      <div className="mobile-header-group lg:hidden">
        <div className="flex justify-between items-center p-6 border-b-2">
          <h1 className="font-black text-2xl text-red-600 uppercase tracking-tighter">STS QAQC</h1>
          <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="text-3xl">☰</button>
        </div>
        <div className="px-6 py-4 bg-white border-b">
          <input className="w-full border-2 p-3 rounded-2xl outline-none" placeholder="Search system..." value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
      </div>

      {/* SIDEBAR */}
      <div className={`${sidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 fixed lg:relative z-50 w-72 h-full bg-white border-r p-6 transition-transform duration-300`}>
        <h1 className="text-2xl font-bold text-red-600 mb-6">STS QAQC</h1>
        <button onClick={()=>setShowAdd(true)} className="bg-red-600 text-white py-3 rounded-2xl font-semibold w-full mb-4 shadow-md">+ Add System</button>
        <label className="hidden lg:flex items-center justify-center bg-gray-100 text-gray-700 py-3 rounded-2xl font-semibold w-full cursor-pointer mb-6">
             📁 Bulk Import (CSV)
             <input type="file" accept=".csv" className="hidden" onChange={handleBulkImport} />
        </label>
        <div className="flex flex-col gap-2">
          <button onClick={()=>setFilter("all")} className="sidebarBtn">🏗️ All Systems</button>
          <button onClick={()=>setFilter("completed")} className="sidebarBtn">🏆 Completed</button>
          <button onClick={()=>setFilter("not_completed")} className="sidebarBtn">🚧 Pending</button>
        </div>
        <button onClick={()=>supabase.auth.signOut()} className="mt-auto w-full py-3 border text-red-600 rounded-xl font-bold">Logout</button>
      </div>

      {/* MAIN CONTENT */}
      <div className="flex-1 p-6 lg:p-10 overflow-y-auto content-spacer lg:mt-0">
        <div className="hidden lg:block relative mb-6">
          <input className="w-full border-2 p-4 rounded-2xl shadow-sm outline-none" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} />
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          {filtered.map(s=>(
            <div key={s.id} className="relative group fade-in">
              {/* THE NOTIFICATION BADGE */}
              {s.status === "completed" && s.has_updates && (
                <div className="absolute -top-3 -left-3 z-30 w-8 h-8 bg-red-600 text-white rounded-full flex items-center justify-center text-lg font-black shadow-xl pulse-red border-2 border-white">!</div>
              )}
              
              <div onClick={()=>setActive(s)} className={`system-card cursor-pointer p-8 rounded-3xl border shadow-sm h-full ${s.status==="completed"?"bg-green-50 border-green-200":"bg-white border-slate-200"}`}>
                <h3 className="font-bold text-xl">{s.id}</h3>
                <p className="text-sm text-gray-600 mt-2">{s.description}</p>
              </div>
              <button onClick={(e) => { e.stopPropagation(); setEditTarget({ ...s, originalId: s.id }); }} className="absolute top-4 right-4 p-2 bg-white/90 border rounded-full lg:opacity-0 lg:group-hover:opacity-100 transition-all">✏️</button>
            </div>
          ))}
        </div>
      </div>

      {/* POPUP MODAL */}
      {active && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[60] backdrop-blur-sm">
          <div className="bg-white w-full max-w-3xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] fade-in">
            <div className="bg-red-600 text-white p-6 rounded-t-3xl flex justify-between items-center">
                <h2 className="text-xl font-bold">{active.id}</h2>
                <button disabled={active.status !== "completed"} onClick={generatePDF} className={`px-4 py-1.5 rounded-xl text-xs font-black ${active.status === "completed" ? "bg-white text-red-600" : "bg-gray-300 text-gray-500 cursor-not-allowed"}`}>EXPORT PDF</button>
            </div>
            <div className="p-6 overflow-y-auto space-y-4 flex-1">
              <textarea value={notes} 
                onChange={e=>{ setNotes(e.target.value); setUpdateTrigger(); }} 
                className="w-full border p-4 rounded-2xl h-32 outline-none focus:ring-2 focus:ring-red-500" placeholder="Notes..." />
              <div className="border-2 border-dashed p-4 rounded-2xl">
                <input id="file-upload" type="file" multiple onChange={setUpdateTrigger} />
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {photos.map(p=>(
                  <div key={p.name} className="border rounded-2xl p-3 bg-slate-50">
                    <img src={p.url} className="rounded-lg mb-2 object-cover w-full h-40" />
                    <button onClick={() => forceDownload(p.url, p.name)} className="w-full bg-red-500 text-white text-xs py-2 rounded-lg font-bold">Download</button>
                  </div>
                ))}
              </div>
            </div>
            <div className="p-6 border-t flex gap-3">
              <button onClick={()=>setActive(null)} className="flex-1 py-3 bg-gray-100 rounded-2xl">Close</button>
              <button onClick={save} className="flex-1 py-3 bg-red-600 text-white rounded-2xl font-bold">Save & Complete</button>
            </div>
          </div>
        </div>
      )}

      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-4">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 className="text-xl font-bold mb-4 text-center">New System</h2>
            <input className="w-full border p-4 rounded-2xl mb-3 outline-none" placeholder="ID" value={newId} onChange={e=>setNewId(e.target.value)} />
            <input className="w-full border p-4 rounded-2xl mb-6 outline-none" placeholder="Desc" value={desc} onChange={e=>setDesc(e.target.value)} />
            <button onClick={createSystem} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold">Add</button>
          </div>
        </div>
      )}

      {editTarget && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-4">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 className="text-xl font-bold mb-4 text-center">Edit System</h2>
            <input className="w-full border p-4 rounded-2xl mb-3 outline-none" value={editTarget.id} onChange={e=>setEditTarget({...editTarget, id: e.target.value})} />
            <input className="w-full border p-4 rounded-2xl mb-6 outline-none" value={editTarget.description} onChange={e=>setEditTarget({...editTarget, description: e.target.value})} />
            <button onClick={updateSystem} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold mb-2">Update</button>
            <button onClick={()=>setEditTarget(null)} className="w-full py-2 text-sm text-gray-500">Cancel</button>
          </div>
        </div>
      )}

    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return () => subscription.unsubscribe();
  },[]);
  return user?<Dashboard user={user}/>:<Auth onAuth={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
