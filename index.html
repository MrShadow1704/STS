<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; overflow-x:hidden; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn {
  from { opacity:0; transform:scale(.95); }
  to { opacity:1; transform:scale(1); }
}
.sidebarBtn { width:100%; text-align:left; padding:.75rem 1rem; border-radius:.75rem; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.sidebarBtn:hover { background:#fee2e2; color:#b91c1c; }

@media (min-width: 1024px) {
  .system-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .system-card:hover { 
    transform: translateY(-8px); 
    box-shadow: 0 20px 25px -5px rgba(220, 38, 38, 0.1), 0 10px 10px -5px rgba(220, 38, 38, 0.04);
    border-color: #ef4444;
  }
}

.toast-in { animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@media (max-width: 1023px) {
  .mobile-header-group { position: fixed; top: 0; left: 0; right: 0; z-index: 40; background: white; }
  .content-spacer { margin-top: 180px; }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SB_URL = "https://bbgcsddwzcrxwzczrojf.supabase.co";
const SB_KEY = "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

/* AUTH */
function Auth({ onAuth }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [showPass, setShowPass]=useState(false);
  const [mode,setMode]=useState("login");
  const [msg,setMsg]=useState("");

  async function submit(){
    try {
      setMsg("");
      if(mode==="signup"){
        const {data, error} = await supabase.auth.signUp({email,password:pass});
        if(error) throw error;
        setMsg("Account created. Login now.");
        setMode("login");
      } else {
        const {data, error}=await supabase.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
        onAuth(data.user);
      }
    } catch(e) { setMsg(e.message); }
  }

  return (
    <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
      <div className="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl fade-in">
        <h1 className="text-2xl font-bold text-center text-red-600 uppercase tracking-tighter">STS QAQC</h1>
        <input className="w-full border p-3 rounded-xl mt-4 focus:ring-2 focus:ring-red-500 outline-none" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <div className="relative mt-2">
          <input type={showPass ? "text" : "password"} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-red-500 outline-none" placeholder="Password" onChange={e=>setPass(e.target.value)} />
          <button type="button" onClick={()=>setShowPass(!showPass)} className="absolute right-4 top-1/2 -translate-y-1/2 text-xl opacity-50 hover:opacity-100 transition-opacity">
              {showPass ? "👁️" : "🙈"}
          </button>
        </div>
        {msg && <p className="text-sm text-center mt-2 text-red-600 font-bold">{msg}</p>}
        <button onClick={submit} className="w-full bg-red-600 text-white p-3 rounded-xl mt-4 font-bold hover:bg-red-700 transition">
          {mode==="login"?"Login":"Create Account"}
        </button>
        <button onClick={()=>setMode(mode==="login"?"signup":"login")} className="w-full text-sm text-red-600 mt-2 font-medium">
          {mode==="login"?"Create Account":"Back to Login"}
        </button>
      </div>
    </div>
  );
}

/* DASHBOARD */
function Dashboard({ user }) {
  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast, setToast] = useState(null);
  const [isListening, setIsListening] = useState(false);
  
  // Persistence Logic for Activity
  const [recentUpdates, setRecentUpdates] = useState(() => {
    const saved = localStorage.getItem('sts_activity_v2');
    return saved ? JSON.parse(saved) : [];
  });

  const channelRef = useRef(null);

  useEffect(() => {
    localStorage.setItem('sts_activity_v2', JSON.stringify(recentUpdates));
  }, [recentUpdates]);

  useEffect(()=>{ 
    loadSystems();
    setupRealtime();
  },[]);

  function setupRealtime() {
    channelRef.current = supabase.channel('global_activity', {
      config: { broadcast: { self: true } }
    });

    channelRef.current
      .on('broadcast', { event: 'update_event' }, ({ payload }) => {
        setRecentUpdates(prev => {
            const filtered = prev.filter(x => x.id !== payload.id);
            return [{ 
                id: payload.id, 
                user: payload.user, 
                type: payload.type,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            }, ...filtered].slice(0, 10);
        });
        loadSystems();
      })
      .subscribe();
  }

  const broadcastChange = (id, type) => {
    if (channelRef.current) {
      channelRef.current.send({
        type: 'broadcast',
        event: 'update_event',
        payload: { id, type, user: user.email }
      });
    }
  };

  const notify = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    setSystems(data||[]);
  }

  async function loadPhotos(id){
    const {data}=await supabase.storage.from("photos").list(id);
    if(!data){ setPhotos([]); return; }
    setPhotos(data.map(f=>{
      const parts=f.name.split("_");
      return {
        name:f.name,
        uploader:parts[1],
        timestamp:new Date(parseInt(parts[0])).toLocaleString(),
        url:supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`).data.publicUrl
      };
    }));
  }

  useEffect(()=>{
    if(active){
      setNotes(active.notes||"");
      loadPhotos(active.id);
    }
  },[active]);

  async function save(){
    const input=document.getElementById("file-upload");
    if(input.files.length){
      for(const f of input.files){
        const path=`${active.id}/${Date.now()}_${user.email}_${f.name}`;
        await supabase.storage.from("photos").upload(path,f);
      }
    }
    const hasContent = notes.trim() || photos.length || input.files.length;
    await supabase.from("systems")
      .update({ notes, status: hasContent ? "completed" : "not_completed" })
      .eq("id",active.id);
    
    broadcastChange(active.id, "SAVED");
    notify("System Saved!");
    setActive(null);
  }

  async function createSystem(){
    if(!newId.trim()) return;
    await supabase.from("systems").insert([{ id:newId.trim(), description:desc, status:"not_completed" }]);
    broadcastChange(newId.trim(), "CREATED");
    setShowAdd(false); setNewId(""); setDesc("");
    notify("System Created!");
  }

  async function updateSystem() {
    await supabase.from("systems").update({ id: editTarget.id, description: editTarget.description }).eq("id", editTarget.originalId);
    broadcastChange(editTarget.id, "EDITED");
    setEditTarget(null);
    notify("System Updated!");
  }

  const filtered = systems.filter(s =>
    (s.id.toLowerCase().includes(search.toLowerCase()) || 
     s.description.toLowerCase().includes(search.toLowerCase())) &&
    (filter==="all" || s.status===filter)
  );

  return (
    <div className="flex h-screen overflow-hidden bg-white">
      {toast && (
        <div className={`fixed top-5 right-5 z-[100] p-4 rounded-2xl shadow-2xl flex items-center gap-3 toast-in text-white font-bold
          ${toast.type === 'delete' ? 'bg-orange-500' : 'bg-green-600'}`}>
          <span>{toast.type === 'delete' ? '⚠️' : '🚀'}</span> {toast.msg}
        </div>
      )}

      {/* MOBILE HEADER */}
      <div className="mobile-header-group lg:hidden">
        <div className="flex justify-between items-center p-6 border-b-2">
          <h1 className="font-black text-2xl text-red-600">STS QAQC</h1>
          <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="text-3xl">☰</button>
        </div>
      </div>

      <div className={`${sidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 fixed lg:relative z-50 w-72 h-full bg-white border-r p-6 transition-transform duration-300 flex flex-col`}>
        <h1 className="text-2xl font-bold text-red-600 mb-1">STS QAQC</h1>
        <p className="text-[10px] text-gray-400 mb-6 truncate">{user.email}</p>
        
        <button onClick={()=>setShowAdd(true)} className="bg-red-600 text-white py-3 rounded-2xl font-semibold mb-6 hover:bg-red-700 transition">+ Add System</button>

        <div className="flex flex-col gap-1 mb-6">
          <button onClick={()=>setFilter("all")} className="sidebarBtn"><span>🏗️</span> All Systems</button>
          <button onClick={()=>setFilter("completed")} className="sidebarBtn"><span>🏆</span> Completed</button>
          <button onClick={()=>setFilter("not_completed")} className="sidebarBtn"><span>🚧</span> Pending</button>
        </div>

        {/* PERSISTENT RECENT ACTIVITY */}
        <div className="flex-1 overflow-y-auto mt-2 border-t pt-4">
            <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Recent Activity</h4>
            <div className="space-y-2">
                {recentUpdates.length === 0 ? (
                    <p className="text-[10px] text-gray-400 italic">No activity yet...</p>
                ) : (
                    recentUpdates.map((item, i) => (
                        <div key={i} className="p-3 bg-slate-50 rounded-xl border border-slate-100 fade-in">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-[10px] font-bold text-red-600">{item.id}</span>
                                <span className="text-[8px] font-black bg-red-100 text-red-600 px-1 rounded">{item.type}</span>
                            </div>
                            <p className="text-[9px] text-gray-500 truncate leading-tight">{item.user}</p>
                            <p className="text-[8px] text-gray-300 mt-1">{item.time}</p>
                        </div>
                    ))
                )}
            </div>
        </div>

        <button onClick={()=>supabase.auth.signOut()} className="mt-6 w-full py-3 border text-red-600 rounded-xl font-bold text-sm">Logout</button>
      </div>

      <div className="flex-1 p-6 lg:p-10 overflow-y-auto content-spacer">
        <input className="hidden lg:block w-full border-2 p-4 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-red-500"
          placeholder="Search systems..." value={search} onChange={e=>setSearch(e.target.value)} />

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          {filtered.map(s=>(
            <div key={s.id} onClick={()=>setActive(s)} className={`p-8 rounded-3xl border cursor-pointer system-card hover:border-red-500 transition-all ${s.status==="completed"?"bg-green-50/50 border-green-100":"bg-white border-slate-100"}`}>
              <h3 className="font-bold text-xl">{s.id}</h3>
              <p className="text-sm text-gray-500 mt-2 line-clamp-2">{s.description || 'No description'}</p>
              <button onClick={(e) => { e.stopPropagation(); setEditTarget({ ...s, originalId: s.id }); }} className="mt-4 text-[10px] text-red-600 font-black uppercase tracking-widest">Edit Details</button>
            </div>
          ))}
        </div>
      </div>

      {active && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[60] backdrop-blur-sm">
          <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] fade-in overflow-hidden">
            <div className="bg-red-600 text-white p-6 flex justify-between items-center">
                <h2 className="text-xl font-bold">{active.id}</h2>
                <button onClick={()=>setActive(null)} className="text-2xl font-light">×</button>
            </div>
            <div className="p-6 overflow-y-auto space-y-4">
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} className="w-full border p-4 rounded-2xl h-32 outline-none focus:ring-2 focus:ring-red-500" placeholder="Inspection notes..." />
              <div className="bg-slate-50 p-4 rounded-2xl border-2 border-dashed">
                <p className="text-xs font-bold text-gray-400 uppercase mb-2">Attachments</p>
                <input id="file-upload" type="file" multiple className="text-xs w-full" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                {photos.map(p=>(
                  <div key={p.name} className="relative group">
                    <img src={p.url} className="rounded-xl h-32 w-full object-cover border" />
                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center rounded-xl">
                        <span className="text-[10px] text-white font-bold">{p.uploader}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="p-6 border-t flex gap-3">
              <button onClick={()=>setActive(null)} className="flex-1 py-4 bg-gray-100 rounded-2xl font-bold">Cancel</button>
              <button onClick={save} className="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold shadow-lg">Complete System</button>
            </div>
          </div>
        </div>
      )}

      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-4 backdrop-blur-sm">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl fade-in">
            <h2 className="text-xl font-bold mb-6 text-center">New System</h2>
            <input className="w-full border p-4 rounded-2xl mb-3 outline-none focus:ring-2 focus:ring-red-500" placeholder="System ID (e.g. STS-001)" value={newId} onChange={e=>setNewId(e.target.value)} />
            <input className="w-full border p-4 rounded-2xl mb-8 outline-none focus:ring-2 focus:ring-red-500" placeholder="Brief Description" value={desc} onChange={e=>setDesc(e.target.value)} />
            <div className="flex gap-3">
                <button onClick={()=>setShowAdd(false)} className="flex-1 py-3 text-gray-400 font-bold">Cancel</button>
                <button onClick={createSystem} className="flex-1 bg-red-600 text-white py-3 rounded-2xl font-bold shadow-lg">Create</button>
            </div>
          </div>
        </div>
      )}

      {editTarget && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-4">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 className="text-xl font-bold mb-6">Edit System</h2>
            <input className="w-full border p-4 rounded-2xl mb-3 outline-none" value={editTarget.id} onChange={e=>setEditTarget({...editTarget, id: e.target.value})} />
            <input className="w-full border p-4 rounded-2xl mb-8 outline-none" value={editTarget.description} onChange={e=>setEditTarget({...editTarget, description: e.target.value})} />
            <button onClick={updateSystem} className="w-full bg-red-600 text-white py-4 rounded-2xl font-bold shadow-lg">Update Records</button>
            <button onClick={()=>setEditTarget(null)} className="w-full mt-4 text-gray-400 font-bold">Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return () => subscription.unsubscribe();
  },[]);
  return user?<Dashboard user={user}/>:<Auth onAuth={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
