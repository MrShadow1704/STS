<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; overflow-x:hidden; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
.sidebarBtn { width:100%; text-align:left; padding:.75rem 1rem; border-radius:.75rem; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.sidebarBtn:hover { background:#fee2e2; color:#b91c1c; }

/* Helmet Animation */
.worker-container { position: relative; width: 40px; height: 40px; cursor: pointer; }
.worker-face { font-size: 30px; position: absolute; z-index: 1; }
.helmet { 
  font-size: 24px; 
  position: absolute; 
  top: -12px; 
  left: 3px; 
  z-index: 2; 
  transition: transform 0.4s cubic-bezier(0.47, 0, 0.745, 0.715); 
}
.helmet.down { transform: translateY(14px); }

.vibrate { animation: shake 0.5s both; }
@keyframes shake { 10%, 90% { transform: translateX(-1px); } 20%, 80% { transform: translateX(2px); } }
.toast-in { animation: slideIn 0.4s ease-out; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = "https://bbgcsddwzcrxwzczrojf.supabase.co";
const SB_KEY = "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

function Auth({ onAuth }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [showPass, setShowPass]=useState(false);
  const [mode,setMode]=useState("login");

  async function submit(){
    try {
      if(mode==="signup"){
        await supabase.auth.signUp({email,password:pass});
        setMode("login");
      } else {
        const {data, error}=await supabase.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
        onAuth(data.user);
      }
    } catch(e) { alert(e.message); }
  }

  return (
    <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
      <div className="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl border-t-8 border-red-600">
        <h1 className="text-3xl font-black text-center text-red-600 uppercase tracking-tighter">STS QAQC</h1>
        <input className="w-full border p-4 rounded-2xl mt-6 outline-none" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <div className="relative mt-3">
          <input type={showPass ? "text" : "password"} className="w-full border p-4 rounded-2xl outline-none" placeholder="Password" onChange={e=>setPass(e.target.value)} />
          <div className="absolute right-4 top-1/2 -translate-y-1/2 worker-container" onClick={()=>setShowPass(!showPass)}>
            <div className={`helmet ${!showPass ? 'down' : ''}`}>⛑️</div>
            <div className="worker-face">👨‍🔧</div>
          </div>
        </div>
        <button onClick={submit} className="w-full bg-red-600 text-white p-4 rounded-2xl mt-6 font-black text-lg active:scale-95 transition">
          {mode==="login"?"Login":"Sign Up"}
        </button>
      </div>
    </div>
  );
}

function Dashboard({ user }) {
  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast, setToast] = useState(null);
  const [isListening, setIsListening] = useState(false);

  useEffect(()=>{ 
    const cached = localStorage.getItem("sts_cache");
    if(cached) setSystems(JSON.parse(cached));
    loadSystems(); 
  },[]);

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    if(data) { setSystems(data); localStorage.setItem("sts_cache", JSON.stringify(data)); }
  }

  async function loadPhotos(id){
    const {data}=await supabase.storage.from("photos").list(id);
    if(data) {
      setPhotos(data.map(f => ({
        name: f.name,
        url: supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`).data.publicUrl
      })));
    }
  }

  useEffect(()=>{ if(active){ setNotes(active.notes||""); loadPhotos(active.id); } },[active]);

  const toggleListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.onstart = () => setIsListening(true);
    recognition.onresult = (e) => setNotes(prev => prev + " " + e.results[0][0].transcript);
    recognition.onend = () => setIsListening(false);
    recognition.start();
  };

  const generatePDF = (s) => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(`STS REPORT: ${s.id}`, 10, 10);
    doc.text(`Notes: ${notes}`, 10, 20);
    doc.save(`${s.id}.pdf`);
  };

  async function save(){
    const input=document.getElementById("file-upload");
    if(input.files.length){
      for(const f of input.files){
        const path=`${active.id}/${Date.now()}_${f.name}`;
        await supabase.storage.from("photos").upload(path,f);
      }
    }
    await supabase.from("systems").update({ notes, status: "completed" }).eq("id",active.id);
    setActive(null); loadSystems();
    setToast("Saved Successfully!");
    setTimeout(()=>setToast(null), 2000);
  }

  async function createSystem(){
    await supabase.from("systems").insert([{ id:newId, description:desc, status:"not_completed" }]);
    setShowAdd(false); setNewId(""); setDesc(""); loadSystems();
  }

  const filtered = systems.filter(s => s.id.toLowerCase().includes(search.toLowerCase()) && (filter==="all" || s.status===filter));

  return (
    <div className="flex h-screen bg-white">
      {toast && <div className="fixed top-5 right-5 z-[100] bg-green-600 p-4 rounded-xl text-white font-bold toast-in">{toast}</div>}

      <div className="lg:hidden fixed top-0 left-0 right-0 bg-white border-b-2 p-6 flex justify-between items-center z-20">
        <h1 className="font-black text-red-600">STS QAQC</h1>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="text-2xl">☰</button>
      </div>

      <div className={`${sidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 fixed lg:relative z-30 w-72 h-full bg-white border-r-2 p-6 transition-transform`}>
        <h1 className="text-2xl font-black text-red-600 mb-6 uppercase">STS QAQC</h1>
        <button onClick={()=>setShowAdd(true)} className="w-full bg-red-600 text-white p-3 rounded-xl mb-6 font-bold">+ Add System</button>
        <div className="space-y-2">
          <button onClick={()=>setFilter("all")} className="sidebarBtn">🏗️ All</button>
          <button onClick={()=>setFilter("completed")} className="sidebarBtn">🏆 Done</button>
          <button onClick={()=>setFilter("not_completed")} className="sidebarBtn">🚧 Pending</button>
        </div>
        <button onClick={()=>supabase.auth.signOut()} className="absolute bottom-6 left-6 right-6 p-3 bg-gray-50 rounded-xl font-bold text-red-600">Logout</button>
      </div>

      <div className="flex-1 p-6 lg:p-10 mt-20 lg:mt-0 overflow-y-auto">
        <input className="w-full border-2 p-4 rounded-2xl mb-8 outline-none font-bold" placeholder="Search..." onChange={e=>setSearch(e.target.value)} />
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          {filtered.map(s=>(
            <div key={s.id} onClick={()=>setActive(s)} className={`p-6 rounded-[2rem] border-2 cursor-pointer transition-all ${s.status==="completed"?"bg-green-50":"bg-white"}`}>
              <h3 className="font-black text-xl">{s.id}</h3>
              <p className="text-xs text-gray-500 uppercase">{s.description}</p>
            </div>
          ))}
        </div>
      </div>

      {active && (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-40 backdrop-blur-md">
          <div className="bg-white w-full max-w-2xl rounded-[2.5rem] flex flex-col max-h-[90vh] overflow-hidden">
            <div className="bg-red-600 p-6 text-white flex justify-between items-center">
              <h2 className="font-black text-2xl">{active.id}</h2>
              <button onClick={()=>generatePDF(active)} className="bg-white/20 px-3 py-1 rounded-lg text-xs font-bold">PDF</button>
            </div>
            <div className="p-6 overflow-y-auto flex-1 space-y-4">
              <div className="relative">
                <textarea value={notes} onChange={e=>setNotes(e.target.value)} className="w-full border-2 p-4 rounded-2xl h-32 outline-none font-bold" placeholder="Notes..." />
                <button onClick={toggleListening} className={`absolute bottom-3 right-3 p-2 rounded-full ${isListening?'bg-red-500 text-white animate-pulse':'bg-gray-100'}`}>🎤</button>
              </div>
              <input id="file-upload" type="file" multiple className="text-xs font-bold" />
              <div className="grid grid-cols-2 gap-2 mt-4">
                {photos.map(p => <img key={p.name} src={p.url} className="w-full h-32 object-cover rounded-xl border" />)}
              </div>
            </div>
            <div className="p-6 border-t flex gap-2">
              <button onClick={()=>setActive(null)} className="flex-1 p-3 bg-gray-100 rounded-xl font-bold">Close</button>
              <button onClick={save} className="flex-1 p-3 bg-red-600 text-white rounded-xl font-bold">Submit</button>
            </div>
          </div>
        </div>
      )}

      {showAdd && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
          <div className="bg-white p-8 rounded-[2rem] w-full max-w-sm border-8 border-red-600">
            <h2 className="text-2xl font-black mb-4 text-center">ADD SYSTEM</h2>
            <input className="w-full border-2 p-4 rounded-xl mb-3 outline-none" placeholder="ID" onChange={e=>setNewId(e.target.value)} />
            <input className="w-full border-2 p-4 rounded-xl mb-6 outline-none" placeholder="Desc" onChange={e=>setDesc(e.target.value)} />
            <button onClick={createSystem} className="w-full bg-red-600 text-white p-4 rounded-xl font-black">ADD</button>
            <button onClick={()=>setShowAdd(false)} className="w-full mt-2 text-gray-400 font-bold">Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
  },[]);
  return user?<Dashboard user={user}/>:<Auth onAuth={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
