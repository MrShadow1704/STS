<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; overflow-x:hidden; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn {
  from { opacity:0; transform:scale(.95); }
  to { opacity:1; transform:scale(1); }
}
.sidebarBtn { width:100%; text-align:left; padding:.75rem 1rem; border-radius:.75rem; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.sidebarBtn:hover { background:#fee2e2; color:#b91c1c; }

/* Web Unique Hover Effect */
@media (min-width: 1024px) {
  .system-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .system-card:hover { 
    transform: translateY(-8px); 
    box-shadow: 0 20px 25px -5px rgba(220, 38, 38, 0.1), 0 10px 10px -5px rgba(220, 38, 38, 0.04);
    border-color: #ef4444;
  }
}

/* Worker Eye Action */
.worker-btn { 
  transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
  filter: drop-shadow(0 0 0px transparent);
}
.worker-btn:active { transform: scale(1.5) rotate(15deg); }
.worker-btn.active { filter: drop-shadow(0 0 8px #facc15); }

.toast-in { animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = "https://bbgcsddwzcrxwzczrojf.supabase.co";
const SB_KEY = "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

/* AUTH */
function Auth({ onAuth }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [showPass, setShowPass]=useState(false);
  const [mode,setMode]=useState("login");
  const [msg,setMsg]=useState("");

  async function submit(){
    try {
      if(mode==="signup"){
        await supabase.auth.signUp({email,password:pass});
        setMsg("Account created. Login now.");
        setMode("login");
      } else {
        const {data, error}=await supabase.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
        onAuth(data.user);
      }
    } catch(e) { setMsg(e.message); }
  }

  return (
    <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
      <div className="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl fade-in border-t-8 border-red-600">
        <h1 className="text-3xl font-black text-center text-red-600 tracking-tighter">STS QAQC</h1>
        <input className="w-full border p-4 rounded-2xl mt-6 focus:ring-2 focus:ring-red-500 outline-none transition-all" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <div className="relative mt-3">
          <input type={showPass ? "text" : "password"} className="w-full border p-4 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none transition-all" placeholder="Password" onChange={e=>setPass(e.target.value)} />
          <button 
            type="button" 
            onClick={()=>setShowPass(!showPass)} 
            className={`absolute right-4 top-1/2 -translate-y-1/2 text-2xl worker-btn ${showPass ? 'active' : ''}`}
          >
            {showPass ? "👷‍♂️" : "👷"}
          </button>
        </div>
        {msg && <p className="text-sm text-center mt-3 text-red-600 font-bold">{msg}</p>}
        <button onClick={submit} className="w-full bg-red-600 text-white p-4 rounded-2xl mt-6 font-black text-lg hover:bg-red-700 shadow-lg active:scale-95 transition">
          {mode==="login"?"Login":"Sign Up"}
        </button>
        <button onClick={()=>setMode(mode==="login"?"signup":"login")} className="w-full text-sm font-bold text-red-600 mt-4 uppercase tracking-widest">
          {mode==="login"?"Create Account":"Back to Login"}
        </button>
      </div>
    </div>
  );
}

/* DASHBOARD */
function Dashboard({ user }) {
  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast, setToast] = useState(null);
  const [confirmData, setConfirmData] = useState(null);

  useEffect(()=>{ loadSystems(); },[]);

  const notify = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    setSystems(data||[]);
  }

  async function loadPhotos(id){
    const {data}=await supabase.storage.from("photos").list(id);
    if(!data){ setPhotos([]); return; }
    setPhotos(data.map(f=>{
      const parts=f.name.split("_");
      return {
        name:f.name,
        uploader:parts[1],
        timestamp:new Date(parseInt(parts[0])).toLocaleString(),
        url:supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`).data.publicUrl
      };
    }));
  }

  useEffect(()=>{
    if(active){
      setNotes(active.notes||"");
      loadPhotos(active.id);
    }
  },[active]);

  async function save(){
    const input=document.getElementById("file-upload");
    if(input.files.length){
      for(const f of input.files){
        const path=`${active.id}/${Date.now()}_${user.email}_${f.name}`;
        await supabase.storage.from("photos").upload(path,f);
      }
    }
    const hasContent = notes.trim() || photos.length || input.files.length;
    await supabase.from("systems")
      .update({ notes, status: hasContent ? "completed" : "not_completed" })
      .eq("id",active.id);
    notify("Progress Saved!");
    setActive(null);
    loadSystems();
  }

  const handleDeletePhoto = (photo) => {
    setConfirmData({
      title: "Delete Photo?",
      msg: "This action cannot be undone.",
      onConfirm: async () => {
        await supabase.storage.from("photos").remove([`${active.id}/${photo.name}`]);
        await loadPhotos(active.id);
        notify("Photo Removed", "delete");
        setConfirmData(null);
      }
    });
  };

  async function createSystem(){
    if(!newId.trim()) return;
    await supabase.from("systems").insert([{
      id:newId.trim(),
      description:desc,
      notes:"",
      status:"not_completed"
    }]);
    setShowAdd(false); setNewId(""); setDesc(""); loadSystems();
    notify("System Added!");
  }

  async function updateSystem() {
    if(!editTarget.id.trim()) return;
    await supabase.from("systems")
      .update({ id: editTarget.id, description: editTarget.description })
      .eq("id", editTarget.originalId);
    setEditTarget(null);
    loadSystems();
    notify("System Updated!");
  }

  const handleDeleteSystem = () => {
    setConfirmData({
      title: "Delete System?",
      msg: `Remove ${editTarget.originalId} permanently?`,
      onConfirm: async () => {
        await supabase.from("systems").delete().eq("id", editTarget.originalId);
        setEditTarget(null);
        loadSystems();
        notify("System Deleted", "delete");
        setConfirmData(null);
      }
    });
  };

  const forceDownload = async (url, filename) => {
    const res = await fetch(url);
    const blob = await res.blob();
    const blobUrl = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  };

  const filtered = systems.filter(s =>
    (s.id.toLowerCase().includes(search.toLowerCase()) || 
     s.description.toLowerCase().includes(search.toLowerCase())) &&
    (filter==="all" || s.status===filter)
  );

  return (
    <div className="flex h-screen overflow-hidden bg-white">
      
      {toast && (
        <div className={`fixed top-5 right-5 z-[100] p-4 rounded-2xl shadow-2xl flex items-center gap-3 toast-in text-white font-bold
          ${toast.type === 'delete' ? 'bg-orange-500' : 'bg-green-600'}`}>
          <span>{toast.type === 'delete' ? '🗑️' : '🚀'}</span>
          {toast.msg}
        </div>
      )}

      {confirmData && (
        <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
          <div className="bg-white p-8 rounded-3xl w-full max-w-xs shadow-2xl fade-in text-center">
            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4 font-bold">!</div>
            <h2 className="text-xl font-black mb-2 uppercase">{confirmData.title}</h2>
            <p className="text-sm text-gray-500 mb-6 font-medium">{confirmData.msg}</p>
            <div className="flex flex-col gap-2">
              <button onClick={confirmData.onConfirm} className="w-full bg-red-600 text-white py-4 rounded-2xl font-black hover:bg-red-700 shadow-lg active:scale-95 transition">DELETE</button>
              <button onClick={() => setConfirmData(null)} className="w-full bg-gray-100 text-gray-700 py-4 rounded-2xl font-black active:scale-95 transition">CANCEL</button>
            </div>
          </div>
        </div>
      )}

      {/* MOBILE HEADER - INCREASED SPACING */}
      <div className="lg:hidden fixed top-0 left-0 right-0 bg-white border-b-2 p-10 flex justify-between items-center z-20 shadow-md">
        <h1 className="font-black text-2xl text-red-600 tracking-tighter">STS QAQC</h1>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="text-3xl p-2 -mr-4">☰</button>
      </div>

      {/* SIDEBAR */}
      <div className={`${sidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 fixed lg:relative z-30 w-72 h-full bg-white border-r-2 p-6 transition-transform duration-300`}>
        <h1 className="text-3xl font-black text-red-600 mb-2 tracking-tighter">STS QAQC</h1>
        <p className="text-[10px] text-gray-400 font-bold break-all mb-6 bg-gray-50 p-2 rounded-lg">{user.email}</p>
        <div className="flex flex-col gap-3 flex-1 mt-4">
          <button onClick={()=>{setFilter("all"); setSidebarOpen(false);}} className="sidebarBtn font-bold"><span>🏗️</span> All Systems</button>
          <button onClick={()=>{setFilter("completed"); setSidebarOpen(false);}} className="sidebarBtn font-bold"><span>🏆</span> Completed</button>
          <button onClick={()=>{setFilter("not_completed"); setSidebarOpen(false);}} className="sidebarBtn font-bold"><span>🚧</span> Pending</button>
        </div>
        <button onClick={()=>supabase.auth.signOut()} className="mt-8 w-full py-4 bg-gray-50 text-red-600 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-red-50 transition border border-gray-100">Logout</button>
      </div>

      {/* MAIN */}
      <div className="flex-1 p-6 lg:p-10 overflow-y-auto mt-48 lg:mt-0">
        <div className="relative mb-8 max-w-4xl mx-auto">
          <input className="w-full border-2 p-5 pr-14 rounded-3xl shadow-sm focus:ring-4 focus:ring-red-100 outline-none transition-all font-bold text-lg"
            placeholder="Find a system..."
            value={search}
            onChange={e=>setSearch(e.target.value)} />
          {search && (
            <button onClick={() => setSearch("")} className="absolute right-5 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 font-bold">✕</button>
          )}
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-24 lg:pb-0">
          {filtered.map(s=>(
            <div key={s.id} className="relative group fade-in">
              <div onClick={()=>setActive(s)}
                className={`system-card cursor-pointer p-8 rounded-[2.5rem] border-2 shadow-sm h-full transition-all
                ${s.status==="completed"?"bg-green-50 border-green-200":"bg-white border-slate-100"}`}>
                <h3 className="font-black text-2xl tracking-tight text-slate-800">{s.id}</h3>
                <p className="text-sm text-slate-500 font-bold mt-2 leading-tight uppercase text-[11px] tracking-wider">{s.description}</p>
                <div className="mt-6 flex justify-between items-center">
                   <span className="text-2xl">{s.status==="completed" ? "🏆" : "🚧"}</span>
                   <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${s.status==="completed" ? 'bg-green-200 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                     {s.status==="completed" ? 'Done' : 'Pending'}
                   </span>
                </div>
              </div>
              
              <button onClick={(e) => { e.stopPropagation(); setEditTarget({ ...s, originalId: s.id }); }}
                className="absolute top-4 right-4 p-3 bg-white border-2 shadow-lg rounded-2xl text-gray-600 hover:text-red-600 hover:border-red-500 transition-all active:scale-95 lg:opacity-0 lg:group-hover:opacity-100 z-10">
                <span className="text-lg">✏️</span>
              </button>
            </div>
          ))}
        </div>
      </div>

      {/* MOBILE QUICK ADD FAB */}
      <button onClick={()=>setShowAdd(true)} className="lg:hidden fixed bottom-8 right-8 w-20 h-20 bg-red-600 text-white rounded-full shadow-2xl text-4xl font-black flex items-center justify-center z-20 active:scale-90 transition-transform ring-8 ring-white">
        +
      </button>

      {/* SYSTEM MODAL */}
      {active && (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-40 backdrop-blur-md">
          <div className="bg-white w-full max-w-3xl rounded-[3rem] shadow-2xl flex flex-col max-h-[90vh] fade-in border-8 border-white overflow-hidden">
            <div className="bg-red-600 text-white p-8 flex justify-between items-center">
                <div>
                    <h2 className="text-3xl font-black tracking-tighter uppercase">{active.id}</h2>
                    <p className="text-xs font-black opacity-80 uppercase tracking-widest">{active.description}</p>
                </div>
                <span className="text-4xl">{active.status === "completed" ? "🏆" : "🚧"}</span>
            </div>
            <div className="p-8 overflow-y-auto space-y-6 flex-1 bg-gray-50">
              <textarea value={notes} onChange={e=>setNotes(e.target.value)}
                className="w-full border-2 border-gray-200 p-6 rounded-[2rem] h-40 focus:ring-4 focus:ring-red-100 outline-none font-bold shadow-inner transition-all" placeholder="Write field notes here..." />
              
              <div className="bg-white p-6 rounded-[2rem] border-2 border-dashed border-red-200">
                <p className="text-sm font-black text-red-600 mb-4 uppercase tracking-widest flex items-center gap-2">
                    <span>📸</span> Upload Inspection Photos
                </p>
                <input id="file-upload" type="file" multiple className="text-sm font-bold file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-red-600 file:text-white file:uppercase file:tracking-widest" />
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                {photos.map(p=>(
                  <div key={p.name} className="bg-white border-2 border-gray-100 rounded-[2rem] p-4 shadow-sm relative overflow-hidden">
                    <a href={p.url} target="_blank" rel="noopener noreferrer">
                        <img src={p.url} className="rounded-[1.5rem] mb-4 cursor-pointer hover:opacity-90 transition object-cover w-full h-48" alt="Preview"/>
                    </a>
                    <div className="px-2">
                        <p className="text-[9px] text-gray-400 font-black uppercase tracking-tighter mb-1">{p.timestamp}</p>
                        <p className="text-xs font-black truncate text-slate-700">{p.uploader}</p>
                    </div>
                    <div className="flex gap-2 mt-4">
                      <button onClick={() => forceDownload(p.url, p.name)} className="flex-1 bg-red-600 text-white text-[10px] py-3 rounded-xl font-black uppercase tracking-widest hover:bg-red-700 transition">Save</button>
                      <button onClick={()=>handleDeletePhoto(p)} className="flex-1 bg-gray-100 text-gray-500 text-[10px] py-3 rounded-xl font-black uppercase tracking-widest transition">Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="p-8 bg-white border-t-2 flex gap-4">
              <button onClick={()=>setActive(null)} className="flex-1 py-4 bg-gray-100 rounded-2xl font-black text-gray-600 active:scale-95 transition uppercase tracking-widest">Close</button>
              <button onClick={save} className="flex-1 py-4 bg-red-600 text-white rounded-2xl font-black text-lg active:scale-95 shadow-xl transition uppercase tracking-widest">Submit Progress</button>
            </div>
          </div>
        </div>
      )}

      {/* CREATE MODAL */}
      {showAdd && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-md">
          <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl fade-in border-8 border-red-600">
            <h2 className="text-3xl font-black mb-6 text-center text-red-600 tracking-tighter">ADD SYSTEM</h2>
            <input className="w-full border-2 p-5 rounded-2xl mb-4 text-center font-black text-xl outline-none focus:ring-4 focus:ring-red-100 transition-all" placeholder="SYSTEM ID" value={newId} onChange={e=>setNewId(e.target.value)} />
            <input className="w-full border-2 p-5 rounded-2xl mb-8 text-center font-bold outline-none focus:ring-4 focus:ring-red-100 transition-all" placeholder="DESCRIPTION" value={desc} onChange={e=>setDesc(e.target.value)} />
            <div className="flex flex-col gap-3">
                <button onClick={createSystem} className="w-full bg-red-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition uppercase tracking-widest">CONFIRM ADD</button>
                <button onClick={()=>setShowAdd(false)} className="w-full text-gray-400 font-black text-sm uppercase tracking-widest py-2">Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT MODAL */}
      {editTarget && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-md">
          <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl fade-in border-8 border-gray-800">
            <h2 className="text-3xl font-black mb-2 text-center text-gray-800 tracking-tighter">UPDATE</h2>
            <p className="text-[10px] text-center text-gray-400 font-black mb-6 uppercase tracking-widest tracking-widest">Ref: {editTarget.originalId}</p>
            <input className="w-full border-2 p-5 rounded-2xl mb-4 text-center font-black text-xl outline-none focus:ring-4 focus:ring-gray-100" placeholder="SYSTEM ID" value={editTarget.id} onChange={e=>setEditTarget({...editTarget, id: e.target.value})} />
            <input className="w-full border-2 p-5 rounded-2xl mb-8 text-center font-bold outline-none focus:ring-4 focus:ring-gray-100" placeholder="DESCRIPTION" value={editTarget.description} onChange={e=>setEditTarget({...editTarget, description: e.target.value})} />
            <div className="space-y-4">
                <button onClick={updateSystem} className="w-full bg-gray-800 text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition uppercase tracking-widest">SAVE CHANGES</button>
                <button onClick={handleDeleteSystem} className="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-black text-sm active:scale-95 transition border border-red-100 uppercase tracking-widest">DELETE PERMANENTLY</button>
                <button onClick={()=>setEditTarget(null)} className="w-full text-gray-400 font-black text-sm uppercase py-2">Close</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return () => subscription.unsubscribe();
  },[]);
  return user?<Dashboard user={user}/>:<Auth onAuth={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
