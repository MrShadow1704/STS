<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn {
  from { opacity:0; transform:scale(.95); }
  to { opacity:1; transform:scale(1); }
}
.sidebarBtn { width: 100%; text-align: left; padding: 0.75rem 1rem; border-radius: 0.75rem; }
.sidebarBtn:hover { background:#fee2e2; color:#b91c1c; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = "https://bbgcsddwzcrxwzczrojf.supabase.co";
const SB_KEY = "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

/* AUTH */
function Auth({ onAuth }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [mode,setMode]=useState("login");
  const [msg,setMsg]=useState("");

  async function submit(){
    try{
      if(mode==="signup"){
        await supabase.auth.signUp({email,password:pass});
        setMsg("Account created");
        setMode("login");
      } else {
        const {data}=await supabase.auth.signInWithPassword({email,password:pass});
        onAuth(data.user);
      }
    }catch(e){setMsg(e.message)}
  }

  return (
    <div className="h-screen flex items-center justify-center">
      <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h1 className="text-2xl font-bold text-center text-red-600">STS QAQC</h1>
        <input className="w-full border p-3 rounded-xl mt-4" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <input type="password" className="w-full border p-3 rounded-xl mt-2" placeholder="Password" onChange={e=>setPass(e.target.value)} />
        {msg && <p className="text-sm text-center mt-2">{msg}</p>}
        <button onClick={submit} className="w-full bg-red-600 text-white p-3 rounded-xl mt-4 font-bold">
          {mode==="login"?"Login":"Create Account"}
        </button>
        <button onClick={()=>setMode(mode==="login"?"signup":"login")} className="w-full text-sm text-red-600 mt-2">
          {mode==="login"?"Create Account":"Back to Login"}
        </button>
      </div>
    </div>
  );
}

/* DASHBOARD */
function Dashboard({ user }) {
  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");

  useEffect(()=>{loadSystems()},[]);

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    setSystems(data||[]);
  }

  async function loadPhotos(id){
    const {data}=await supabase.storage.from("photos").list(id);
    if(!data){setPhotos([]);return;}

    setPhotos(data.map(f=>{
      const parts=f.name.split("_");
      return {
        name:f.name,
        uploader:parts[1],
        timestamp:new Date(parseInt(parts[0])).toLocaleString(),
        url:supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`).data.publicUrl
      };
    }));
  }

  useEffect(()=>{
    if(active){
      setNotes(active.notes||"");
      loadPhotos(active.id);
    }
  },[active]);

  async function save(){
    const input=document.getElementById("file-upload");
    if(input.files.length){
      for(const f of input.files){
        const path=`${active.id}/${Date.now()}_${user.email}_${f.name}`;
        await supabase.storage.from("photos").upload(path,f);
      }
    }

    const hasContent = notes.trim() || photos.length || input.files.length;

    await supabase.from("systems")
      .update({ 
        notes, 
        status: hasContent ? "completed" : "not_completed" 
      })
      .eq("id",active.id);

    setActive(null);
    loadSystems();
  }

  async function deletePhoto(photo){
    await supabase.storage.from("photos").remove([`${active.id}/${photo.name}`]);
    await loadPhotos(active.id);

    if(!notes.trim()){
      const {data}=await supabase.storage.from("photos").list(active.id);
      if(!data.length){
        await supabase.from("systems").update({status:"not_completed"}).eq("id",active.id);
        loadSystems();
      }
    }
  }

  async function createSystem(){
    await supabase.from("systems").insert([{
      id:newId,
      description:desc,
      notes:"",
      status:"not_completed"
    }]);
    setShowAdd(false); setNewId(""); setDesc(""); loadSystems();
  }

  return (
    <div className="flex h-screen">
      <div className="w-72 bg-white border-r p-6">
        <h1 className="text-2xl font-bold text-red-600">STS QAQC</h1>
        <button onClick={()=>setShowAdd(true)} className="mt-6 w-full bg-red-600 text-white py-3 rounded-xl font-bold">
          + Add System
        </button>
        <button onClick={()=>supabase.auth.signOut()} className="mt-6 w-full border text-red-600 py-3 rounded-xl">
          Logout
        </button>
      </div>

      <div className="flex-1 p-6 overflow-y-auto">
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          {systems.map(s=>(
            <div key={s.id} onClick={()=>setActive(s)}
              className={`p-6 rounded-3xl border cursor-pointer ${s.status==="completed"?"bg-green-50":"bg-white"}`}>
              <h3 className="font-bold text-lg">{s.id}</h3>
              <p className="text-sm text-gray-600 mt-1">{s.description}</p>
            </div>
          ))}
        </div>
      </div>

      {active && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-2xl rounded-3xl p-6">
            <h2 className="font-bold text-xl mb-2">{active.id}</h2>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)}
              className="w-full border rounded-xl p-4 h-32" />

            <input id="file-upload" type="file" multiple className="mt-4"/>

            <div className="grid grid-cols-2 gap-4 mt-4">
              {photos.map(p=>(
                <div key={p.name} className="border rounded-xl p-2">
                  <img src={p.url} className="rounded mb-2"/>
                  <p className="text-xs">{p.timestamp}</p>
                  <p className="text-xs">{p.uploader}</p>
                  <div className="flex gap-2 mt-2">
                    <a href={p.url} download className="flex-1 bg-red-500 text-white text-xs py-2 rounded text-center">Download</a>
                    <button onClick={()=>deletePhoto(p)} className="flex-1 bg-gray-200 text-xs py-2 rounded">Delete</button>
                  </div>
                </div>
              ))}
            </div>

            <div className="flex gap-3 mt-6">
              <button onClick={()=>setActive(null)} className="flex-1 border py-3 rounded-xl">Close</button>
              <button onClick={save} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">
                Save
              </button>
            </div>
          </div>
        </div>
      )}

      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center">
          <div className="bg-white p-6 rounded-3xl w-full max-w-sm">
            <input placeholder="System Number" value={newId} onChange={e=>setNewId(e.target.value)}
              className="w-full border p-3 rounded-xl mb-3 text-center font-bold"/>
            <input placeholder="Description" value={desc} onChange={e=>setDesc(e.target.value)}
              className="w-full border p-3 rounded-xl mb-6 text-center"/>
            <button onClick={createSystem} className="w-full bg-red-600 text-white py-3 rounded-xl font-bold">
              Add System
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
  },[]);
  return user?<Dashboard user={user}/>:<Auth onAuth={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
