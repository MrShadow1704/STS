<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; overflow-x:hidden; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn {
  from { opacity:0; transform:scale(.95); }
  to { opacity:1; transform:scale(1); }
}
.sidebarBtn { width:100%; text-align:left; padding:.75rem 1rem; border-radius:.75rem; }
.sidebarBtn:hover { background:#fee2e2; color:#b91c1c; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = "https://bbgcsddwzcrxwzczrojf.supabase.co";
const SB_KEY = "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

/* AUTH */
function Auth({ onAuth }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [mode,setMode]=useState("login");
  const [msg,setMsg]=useState("");

  async function submit(){
    try{
      if(mode==="signup"){
        await supabase.auth.signUp({email,password:pass});
        setMsg("Account created. Login now.");
        setMode("login");
      } else {
        const {data}=await supabase.auth.signInWithPassword({email,password:pass});
        onAuth(data.user);
      }
    }catch(e){ setMsg(e.message); }
  }

  return (
    <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
      <div className="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl fade-in">
        <h1 className="text-2xl font-bold text-center text-red-600">STS QAQC</h1>
        <input className="w-full border p-3 rounded-xl mt-4" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <input type="password" className="w-full border p-3 rounded-xl mt-2" placeholder="Password" onChange={e=>setPass(e.target.value)} />
        {msg && <p className="text-sm text-center mt-2">{msg}</p>}
        <button onClick={submit} className="w-full bg-red-600 text-white p-3 rounded-xl mt-4 font-bold">
          {mode==="login"?"Login":"Create Account"}
        </button>
        <button onClick={()=>setMode(mode==="login"?"signup":"login")} className="w-full text-sm text-red-600 mt-2">
          {mode==="login"?"Create Account":"Back to Login"}
        </button>
      </div>
    </div>
  );
}

/* DASHBOARD */
function Dashboard({ user }) {
  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");
  const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(()=>{ loadSystems(); },[]);

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    setSystems(data||[]);
  }

  async function loadPhotos(id){
    const {data}=await supabase.storage.from("photos").list(id);
    if(!data){ setPhotos([]); return; }

    setPhotos(data.map(f=>{
      const parts=f.name.split("_");
      return {
        name:f.name,
        uploader:parts[1],
        timestamp:new Date(parseInt(parts[0])).toLocaleString(),
        url:supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`).data.publicUrl
      };
    }));
  }

  useEffect(()=>{
    if(active){
      setNotes(active.notes||"");
      loadPhotos(active.id);
    }
  },[active]);

  async function save(){
    const input=document.getElementById("file-upload");
    if(input.files.length){
      for(const f of input.files){
        const path=`${active.id}/${Date.now()}_${user.email}_${f.name}`;
        await supabase.storage.from("photos").upload(path,f);
      }
    }

    const hasContent = notes.trim() || photos.length || input.files.length;

    await supabase.from("systems")
      .update({ notes, status: hasContent ? "completed" : "not_completed" })
      .eq("id",active.id);

    setActive(null);
    loadSystems();
  }

  async function deletePhoto(photo){
    await supabase.storage.from("photos").remove([`${active.id}/${photo.name}`]);
    await loadPhotos(active.id);

    if(!notes.trim()){
      const {data}=await supabase.storage.from("photos").list(active.id);
      if(!data.length){
        await supabase.from("systems").update({status:"not_completed"}).eq("id",active.id);
        loadSystems();
      }
    }
  }

  async function createSystem(){
    if(!newId.trim()) return;
    await supabase.from("systems").insert([{
      id:newId.trim(),
      description:desc,
      notes:"",
      status:"not_completed"
    }]);
    setShowAdd(false); setNewId(""); setDesc(""); loadSystems();
  }

  const filtered = systems.filter(s =>
    s.id.toLowerCase().includes(search.toLowerCase()) &&
    (filter==="all" || s.status===filter)
  );

  return (
    <div className="flex h-screen overflow-hidden">

      {/* MOBILE HEADER */}
      <div className="lg:hidden fixed top-0 left-0 right-0 bg-white border-b p-4 flex justify-between z-20">
        <h1 className="font-bold text-red-600">STS QAQC</h1>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="text-2xl">☰</button>
      </div>

      {/* SIDEBAR */}
      <div className={`${sidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 fixed lg:relative z-30 w-72 h-full bg-white border-r p-6 transition`}>
        <h1 className="text-2xl font-bold text-red-600 mb-2">STS QAQC</h1>
        <p className="text-xs text-gray-500 break-all mb-4">{user.email}</p>

        <button onClick={()=>setShowAdd(true)} className="bg-red-600 text-white py-3 rounded-2xl font-semibold mb-6 w-full">
          + Add System
        </button>

        <div className="flex flex-col gap-2 flex-1">
          <button onClick={()=>setFilter("all")} className="sidebarBtn">📁 All Systems</button>
          <button onClick={()=>setFilter("completed")} className="sidebarBtn">✅ Completed</button>
          <button onClick={()=>setFilter("not_completed")} className="sidebarBtn">❌ Not Completed</button>
        </div>

        <button onClick={()=>supabase.auth.signOut()} className="mt-6 w-full py-3 border text-red-600 rounded-xl font-bold">
          Logout
        </button>
      </div>

      {/* MAIN */}
      <div className="flex-1 p-6 lg:p-10 overflow-y-auto mt-14 lg:mt-0">
        <input className="w-full border p-4 rounded-2xl mb-6"
          placeholder="Search system ID..."
          value={search}
          onChange={e=>setSearch(e.target.value)} />

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          {filtered.map(s=>(
            <div key={s.id} onClick={()=>setActive(s)}
              className={`cursor-pointer p-8 rounded-3xl border shadow-sm
              ${s.status==="completed"?"bg-green-50 border-green-200":"bg-white border-slate-200"}`}>
              <h3 className="font-bold text-xl">{s.id}</h3>
              <p className="text-sm text-gray-600 mt-2">{s.description}</p>
            </div>
          ))}
        </div>
      </div>

      {/* SYSTEM MODAL */}
      {active && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-40">
          <div className="bg-white w-full max-w-3xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh]">
            <div className="bg-red-600 text-white p-6">
              <h2 className="text-xl font-bold">{active.id}</h2>
            </div>

            <div className="p-6 overflow-y-auto space-y-4 flex-1">
              <textarea value={notes} onChange={e=>setNotes(e.target.value)}
                className="w-full border p-4 rounded-2xl h-32"
                placeholder="Inspection notes..." />

              <input id="file-upload" type="file" multiple />

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {photos.map(p=>(
                  <div key={p.name} className="border rounded-2xl p-2">
                    <img src={p.url} className="rounded mb-2"/>
                    <p className="text-xs">{p.timestamp}</p>
                    <p className="text-xs">{p.uploader}</p>
                    <div className="flex gap-2 mt-2">
                      <a href={p.url} download className="flex-1 bg-red-500 text-white text-xs py-2 rounded text-center">Download</a>
                      <button onClick={()=>deletePhoto(p)} className="flex-1 bg-gray-200 text-xs py-2 rounded">Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="p-6 border-t flex gap-3">
              <button onClick={()=>setActive(null)} className="flex-1 py-3 bg-gray-100 rounded-2xl">Close</button>
              <button onClick={save} className="flex-1 py-3 bg-red-600 text-white rounded-2xl font-bold">
                Save & Complete
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ADD SYSTEM MODAL */}
      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm">
            <input className="w-full border p-4 rounded-2xl mb-3 text-center font-bold"
              placeholder="System Number"
              value={newId}
              onChange={e=>setNewId(e.target.value)} />
            <input className="w-full border p-4 rounded-2xl mb-6 text-center"
              placeholder="Description"
              value={desc}
              onChange={e=>setDesc(e.target.value)} />
            <button onClick={createSystem} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold">
              Add System
            </button>
          </div>
        </div>
      )}

    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
  },[]);
  return user?<Dashboard user={user}/>:<Auth onAuth={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
