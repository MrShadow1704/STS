<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STS QAQC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
.fade { animation: fade .2s ease-out }
@keyframes fade {
  from {opacity:0; transform:scale(.95)}
  to {opacity:1; transform:scale(1)}
}
.toast {
  position:fixed;
  top:20px;
  right:20px;
  background:#16a34a;
  color:white;
  padding:12px 20px;
  border-radius:12px;
  font-weight:600;
  z-index:1000;
}
</style>
</head>

<body class="bg-white">
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect} = React;

const supabase = window.supabase.createClient(
  "https://bbgcsddwzcrxwzczrojf.supabase.co",
  "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f"
);

function Toast({msg}) {
  if(!msg) return null;
  return <div className="toast fade">{msg}</div>;
}

function Dashboard({user}) {
  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");

  const [showAdd,setShowAdd]=useState(false);
  const [showEdit,setShowEdit]=useState(null);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");

  const [toast,setToast]=useState("");

  function notify(msg){
    setToast(msg);
    setTimeout(()=>setToast(""),2000);
  }

  useEffect(()=>{ loadSystems(); },[]);

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    setSystems(data||[]);
  }

  async function createSystem(){
    const idNum = Number(newId);
    if(isNaN(idNum)) return alert("System number must be numeric");

    const {data:exists}=await supabase
      .from("systems")
      .select("id")
      .eq("id",idNum)
      .single();

    if(exists) return alert("System number already exists");

    const {error}=await supabase.from("systems").insert([{
      id:idNum,
      description: desc.trim() || "Put your description here",
      notes:"",
      status:"not_completed"
    }]);

    if(error) return alert(error.message);

    setShowAdd(false);
    setNewId(""); setDesc("");
    loadSystems();
    notify("System added successfully");
  }

  async function updateSystem(){
    const idNum = Number(newId);
    if(isNaN(idNum)) return alert("System number must be numeric");

    if(idNum !== showEdit.id){
      const {data:dup}=await supabase
        .from("systems")
        .select("id")
        .eq("id",idNum)
        .single();
      if(dup) return alert("System number already exists");
    }

    const {error}=await supabase
      .from("systems")
      .update({
        id:idNum,
        description: desc.trim() || "Put your description here"
      })
      .eq("id",showEdit.id);

    if(error) return alert(error.message);

    setShowEdit(null);
    loadSystems();
    notify("System updated successfully");
  }

  const filtered = systems.filter(s =>
    s.id.toString().includes(search) &&
    (filter==="all" || s.status===filter)
  );

  return (
    <div className="flex h-screen overflow-hidden">
      <Toast msg={toast} />

      <aside className="w-72 border-r p-6">
        <h1 className="text-2xl font-bold text-red-600 mb-6">STS QAQC</h1>

        <button onClick={()=>setShowAdd(true)}
          className="bg-red-600 text-white w-full py-3 rounded-xl font-bold mb-6">
          + Add System
        </button>

        <button onClick={()=>setFilter("all")} className="w-full text-left py-2">📁 All</button>
        <button onClick={()=>setFilter("completed")} className="w-full text-left py-2">✅ Completed</button>
        <button onClick={()=>setFilter("not_completed")} className="w-full text-left py-2">❌ Not Completed</button>

        <button onClick={()=>supabase.auth.signOut()}
          className="mt-6 w-full border py-3 rounded-xl text-red-600 font-bold">
          Logout
        </button>
      </aside>

      <main className="flex-1 p-8 overflow-y-auto">
        <input
          className="w-full border p-4 rounded-xl mb-6"
          placeholder="Search system..."
          value={search}
          onChange={e=>setSearch(e.target.value)}
        />

        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          {filtered.map(s=>(
            <div key={s.id}
              className="border rounded-3xl p-6 shadow-sm">
              <div onClick={()=>setActive(s)} className="cursor-pointer">
                <h2 className="text-xl font-bold">{s.id}</h2>
                <p className="text-sm mt-2 text-gray-600">
                  {s.description || "Put your description here"}
                </p>
              </div>
              <button
                onClick={()=>{
                  setShowEdit(s);
                  setNewId(s.id);
                  setDesc(s.description);
                }}
                className="mt-4 text-xs text-red-600 font-bold">
                ✏️ Edit
              </button>
            </div>
          ))}
        </div>
      </main>

      {/* ADD SYSTEM */}
      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center">
          <div className="bg-white p-8 rounded-3xl w-96 fade">
            <h2 className="font-bold mb-4 text-center">Add System</h2>
            <input className="w-full border p-3 rounded-xl mb-3"
              placeholder="System Number"
              value={newId}
              onChange={e=>setNewId(e.target.value)}
            />
            <input className="w-full border p-3 rounded-xl mb-6"
              placeholder="Description"
              value={desc}
              onChange={e=>setDesc(e.target.value)}
            />
            <button onClick={createSystem}
              className="w-full bg-red-600 text-white py-3 rounded-xl font-bold">
              Add System
            </button>
            <button onClick={()=>setShowAdd(false)}
              className="w-full mt-3 border py-2 rounded-xl">
              Cancel
            </button>
          </div>
        </div>
      )}

      {/* EDIT SYSTEM */}
      {showEdit && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center">
          <div className="bg-white p-8 rounded-3xl w-96 fade">
            <h2 className="font-bold mb-4 text-center">Edit System</h2>
            <input className="w-full border p-3 rounded-xl mb-3"
              value={newId}
              onChange={e=>setNewId(e.target.value)}
            />
            <input className="w-full border p-3 rounded-xl mb-6"
              value={desc}
              onChange={e=>setDesc(e.target.value)}
            />
            <button onClick={updateSystem}
              className="w-full bg-red-600 text-white py-3 rounded-xl font-bold">
              Save Changes
            </button>
            <button onClick={()=>setShowEdit(null)}
              className="w-full mt-3 border py-2 rounded-xl">
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
  },[]);
  return user ? <Dashboard user={user}/> : <div>Login screen unchanged</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
