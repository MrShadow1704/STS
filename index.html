<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; overflow-x:hidden }
.fade-in { animation: fade .25s ease-out }
@keyframes fade {
  from {opacity:0; transform:scale(.95)}
  to {opacity:1; transform:scale(1)}
}
.sidebarBtn { width:100%; text-align:left; padding:.75rem 1rem; border-radius:.75rem }
.sidebarBtn:hover { background:#fee2e2; color:#dc2626 }
.toast {
  position:fixed; top:20px; right:20px;
  background:#16a34a; color:white;
  padding:12px 18px; border-radius:12px;
  font-weight:700; z-index:1000;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const supabase = window.supabase.createClient(
  "https://bbgcsddwzcrxwzczrojf.supabase.co",
  "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f"
);

function Toast({msg}) {
  if(!msg) return null;
  return <div className="toast fade-in">{msg}</div>;
}

/* ================= DASHBOARD ================= */
function Dashboard({ user }) {
  const [systems, setSystems] = useState([]);
  const [active, setActive] = useState(null);
  const [notes, setNotes] = useState("");
  const [photos, setPhotos] = useState([]);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [showAdd, setShowAdd] = useState(false);
  const [newId, setNewId] = useState("");
  const [toast, setToast] = useState("");

  function notify(msg){
    setToast(msg);
    setTimeout(()=>setToast(""),2000);
  }

  useEffect(() => { loadSystems(); }, []);

  async function loadSystems() {
    const { data } = await supabase.from("systems").select("*").order("id");
    setSystems(data || []);
  }

  useEffect(() => {
    if (!active) return;
    setNotes(active.notes || "");
    loadPhotos(active.id);
  }, [active]);

  async function loadPhotos(id) {
    const { data } = await supabase.storage.from("photos").list(id);
    if (!data) return setPhotos([]);

    const mapped = data.map(f => {
      const { data:{ publicUrl } } =
        supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`);

      const parts = f.name.split("_");
      return {
        name: f.name,
        url: publicUrl,
        owner: parts[1] || "Unknown",
        timestamp: new Date(Number(parts[0])).toLocaleString()
      };
    });

    setPhotos(mapped);
  }

  async function handleSave() {
    let status = "completed";
    if (!notes.trim() && photos.length === 0) status = "not_completed";

    await supabase.from("systems")
      .update({ notes, status })
      .eq("id", active.id);

    setActive(null);
    loadSystems();
    notify("System saved");
  }

  async function createSystem() {
    if (!newId.trim()) return;

    const { data: exists } = await supabase
      .from("systems").select("id").eq("id", newId).single();

    if (exists) return alert("Duplicate system number");

    await supabase.from("systems").insert([{
      id: newId,
      notes: "",
      status: "not_completed"
    }]);

    setNewId(""); setShowAdd(false);
    loadSystems();
    notify("System added");
  }

  async function deletePhoto(photo) {
    await supabase.storage.from("photos")
      .remove([`${active.id}/${photo.name}`]);

    loadPhotos(active.id);
    notify("Photo deleted");
  }

  const filtered = systems.filter(s =>
    s.id.toLowerCase().includes(search.toLowerCase()) &&
    (filter === "all" || s.status === filter)
  );

  return (
    <div className="flex h-screen overflow-hidden">
      <Toast msg={toast} />

      {/* SIDEBAR */}
      <div className="w-72 border-r p-6 bg-white">
        <h1 className="text-2xl font-bold text-red-600 mb-6">STS QAQC</h1>

        <button onClick={()=>setShowAdd(true)}
          className="bg-red-600 text-white w-full py-3 rounded-2xl font-bold mb-6">
          + Add System
        </button>

        <button onClick={()=>setFilter("all")} className="sidebarBtn">📁 All</button>
        <button onClick={()=>setFilter("completed")} className="sidebarBtn">✅ Completed</button>
        <button onClick={()=>setFilter("not_completed")} className="sidebarBtn">❌ Not Completed</button>

        <button onClick={()=>supabase.auth.signOut()}
          className="mt-6 w-full py-3 border rounded-xl text-red-600 font-bold">
          Logout
        </button>
      </div>

      {/* MAIN */}
      <div className="flex-1 p-8 overflow-y-auto">
        <input
          className="w-full border p-4 rounded-2xl mb-6"
          placeholder="Search system ID..."
          value={search}
          onChange={e=>setSearch(e.target.value)}
        />

        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          {filtered.map(s => (
            <div key={s.id}
              onClick={()=>setActive(s)}
              className={`cursor-pointer p-6 rounded-3xl border shadow-sm
              ${s.status === "completed"
                ? "bg-green-50 border-green-300"
                : "bg-white border-red-200"}`}>
              <h3 className="text-xl font-bold">{s.id}</h3>
              <p className="mt-2 font-medium">
                {s.status === "completed" ? "🟢 Completed" : "🔴 Pending"}
              </p>
            </div>
          ))}
        </div>
      </div>

      {/* SYSTEM MODAL */}
      {active && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-2xl rounded-3xl flex flex-col max-h-[90vh] fade-in">
            <div className="bg-red-600 text-white p-6">
              <h2 className="text-xl font-bold">System {active.id}</h2>
            </div>

            <div className="p-6 overflow-y-auto space-y-4">
              <textarea
                className="w-full border p-4 rounded-2xl h-32"
                value={notes}
                onChange={e=>setNotes(e.target.value)}
                placeholder="Inspection notes..."
              />

              <input id="file-upload" type="file" multiple accept="image/*" />

              <div className="grid grid-cols-2 gap-4">
                {photos.map((p,i)=>(
                  <div key={i} className="border p-2 rounded-xl">
                    <img src={p.url} className="w-full h-32 object-cover rounded"/>
                    <p className="text-xs mt-1"><b>By:</b> {p.owner}</p>
                    <p className="text-xs"><b>At:</b> {p.timestamp}</p>
                    <button
                      onClick={()=>deletePhoto(p)}
                      className="mt-2 w-full bg-red-500 text-white text-xs py-2 rounded">
                      Delete
                    </button>
                  </div>
                ))}
              </div>
            </div>

            <div className="p-6 border-t flex gap-3">
              <button onClick={()=>setActive(null)}
                className="flex-1 bg-gray-100 py-3 rounded-xl font-bold">
                Close
              </button>
              <button onClick={handleSave}
                className="flex-[2] bg-red-600 text-white py-3 rounded-xl font-bold">
                Save & Complete
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ADD SYSTEM */}
      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center">
          <div className="bg-white p-8 rounded-3xl fade-in">
            <h2 className="font-bold mb-4 text-center">New System</h2>
            <input
              className="border p-4 rounded-xl w-full mb-4 text-center font-bold"
              placeholder="System ID"
              value={newId}
              onChange={e=>setNewId(e.target.value)}
            />
            <button onClick={createSystem}
              className="w-full bg-red-600 text-white py-3 rounded-xl font-bold">
              Add
            </button>
            <button onClick={()=>setShowAdd(false)}
              className="w-full mt-3 border py-2 rounded-xl">
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= ROOT ================= */
function Root() {
  const [user, setUser] = useState(null);
  useEffect(() => {
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
  }, []);
  return user ? <Dashboard user={user}/> : <div>Login unchanged</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
