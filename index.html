<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STS QAQC</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Inter, sans-serif; background:#fff; overflow-x:hidden; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
.sidebarBtn { width:100%; text-align:left; padding:.75rem 1rem; border-radius:.75rem; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.sidebarBtn:hover { background:#fee2e2; color:#b91c1c; }

@media (min-width: 1024px) {
  .system-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .system-card:hover { 
    transform: translateY(-8px); 
    box-shadow: 0 20px 25px -5px rgba(220, 38, 38, 0.1), 0 10px 10px -5px rgba(220, 38, 38, 0.04);
    border-color: #ef4444;
  }
}

.toast-in { animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = "https://bbgcsddwzcrxwzczrojf.supabase.co";
const SB_KEY = "sb_publishable_678Ol2HCLnEtOJNwly0vDg_XQS9f72f";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

/* AUTH */
function Auth({ onAuth }) {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [showPass, setShowPass]=useState(false);
  const [mode,setMode]=useState("login");
  const [msg,setMsg]=useState("");

  async function submit(){
    try {
      if(mode==="signup"){
        await supabase.auth.signUp({email,password:pass});
        setMsg("Account created. Login now.");
        setMode("login");
      } else {
        const {data, error}=await supabase.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
        onAuth(data.user);
      }
    } catch(e) { setMsg(e.message); }
  }

  return (
    <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
      <div className="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl fade-in">
        <h1 className="text-2xl font-bold text-center text-red-600 uppercase tracking-tighter italic">STS QAQC</h1>
        <input className="w-full border p-3 rounded-xl mt-4 focus:ring-2 focus:ring-red-500 outline-none" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <div className="relative mt-2">
          <input type={showPass ? "text" : "password"} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-red-500 outline-none" placeholder="Password" onChange={e=>setPass(e.target.value)} />
          <button type="button" onClick={()=>setShowPass(!showPass)} className="absolute right-4 top-1/2 -translate-y-1/2 text-xl opacity-50 hover:opacity-100 transition">
             {showPass ? "👁️" : "🙈"}
          </button>
        </div>
        {msg && <p className="text-sm text-center mt-2 text-red-600 font-bold">{msg}</p>}
        <button onClick={submit} className="w-full bg-red-600 text-white p-3 rounded-xl mt-4 font-bold hover:bg-red-700 transition">
          {mode==="login"?"Login":"Create Account"}
        </button>
        <button onClick={()=>setMode(mode==="login"?"signup":"login")} className="w-full text-sm text-red-600 mt-2 font-medium">
          {mode==="login"?"Create Account":"Back to Login"}
        </button>
      </div>
    </div>
  );
}

/* DASHBOARD */
function Dashboard({ user }) {
  const [systems,setSystems]=useState([]);
  const [active,setActive]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [notes,setNotes]=useState("");
  const [photos,setPhotos]=useState([]);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [newId,setNewId]=useState("");
  const [desc,setDesc]=useState("");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast, setToast] = useState(null);
  const [confirmData, setConfirmData] = useState(null);
  const [isListening, setIsListening] = useState(false);

  useEffect(()=>{ loadSystems(); },[]);

  const notify = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  async function loadSystems(){
    const {data}=await supabase.from("systems").select("*").order("id");
    setSystems(data||[]);
  }

  async function loadPhotos(id){
    const {data}=await supabase.storage.from("photos").list(id);
    if(!data){ setPhotos([]); return; }
    setPhotos(data.map(f=>{
      const parts=f.name.split("_");
      return {
        name:f.name,
        uploader:parts[1],
        timestamp:new Date(parseInt(parts[0])).toLocaleString(),
        url:supabase.storage.from("photos").getPublicUrl(`${id}/${f.name}`).data.publicUrl
      };
    }));
  }

  useEffect(()=>{
    if(active){
      setNotes(active.notes||"");
      loadPhotos(active.id);
    }
  },[active]);

  const startListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Browser not supported.");
    const recognition = new SpeechRecognition();
    recognition.onstart = () => setIsListening(true);
    recognition.onresult = (e) => setNotes(prev => prev + " " + e.results[0][0].transcript);
    recognition.onend = () => setIsListening(false);
    recognition.start();
  };

  /* CREATIVE THEMED PDF GENERATOR WITH PHOTOS */
  const generatePDF = async () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Header - Red Brand Bar
    doc.setFillColor(220, 38, 38);
    doc.rect(0, 0, 210, 40, 'F');
    
    // Logo Text
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(26);
    doc.setFont("helvetica", "bold");
    doc.text("STS QAQC", 20, 25);
    
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.text("OFFICIAL INSPECTION REPORT", 20, 32);
    doc.text(`REF: ${active.id} | DATE: ${new Date().toLocaleDateString()}`, 130, 32);

    // Summary Section
    doc.setTextColor(40, 40, 40);
    doc.setFontSize(12);
    doc.text("SYSTEM INFORMATION", 20, 55);
    doc.setDrawColor(220, 38, 38);
    doc.setLineWidth(0.5);
    doc.line(20, 57, 190, 57);

    doc.setFontSize(10);
    doc.text(`System ID:`, 20, 65);
    doc.setFont("helvetica", "bold");
    doc.text(active.id, 60, 65);
    
    doc.setFont("helvetica", "normal");
    doc.text(`Description:`, 20, 72);
    doc.text(active.description || "N/A", 60, 72);
    
    doc.text(`Inspector:`, 20, 79);
    doc.text(user.email, 60, 79);

    // Notes Section
    doc.setFontSize(12);
    doc.text("INSPECTOR NOTES", 20, 95);
    doc.line(20, 97, 190, 97);
    
    doc.setFont("helvetica", "italic");
    doc.setFontSize(10);
    const splitNotes = doc.splitTextToSize(notes || "No notes recorded.", 170);
    doc.text(splitNotes, 20, 105);

    // Photos Section - One below the other
    if (photos.length > 0) {
      doc.addPage();
      doc.setFillColor(220, 38, 38);
      doc.rect(0, 0, 210, 15, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(10);
      doc.text("PHOTO EVIDENCE ATTACHMENTS", 20, 10);

      let yOffset = 25;
      for (const photo of photos) {
        try {
          const img = await fetch(photo.url);
          const blob = await img.blob();
          const base64 = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          });

          // If photo will go off page, add new page
          if (yOffset + 90 > 280) {
            doc.addPage();
            yOffset = 20;
          }

          doc.addImage(base64, "JPEG", 20, yOffset, 170, 100, undefined, 'FAST');
          yOffset += 105;
          doc.setTextColor(150, 150, 150);
          doc.setFontSize(8);
          doc.text(`File: ${photo.name} | Captured by: ${photo.uploader}`, 20, yOffset - 2);
          yOffset += 10;
        } catch (e) {
          console.error("PDF Image Error", e);
        }
      }
    }

    doc.save(`STS_REPORT_${active.id}.pdf`);
    notify("Report Generated with Photos!");
  };

  async function save(){
    const input=document.getElementById("file-upload");
    if(input.files.length){
      for(const f of input.files){
        const path=`${active.id}/${Date.now()}_${user.email}_${f.name}`;
        await supabase.storage.from("photos").upload(path,f);
      }
    }
    const hasContent = notes.trim() || photos.length || input.files.length;
    await supabase.from("systems").update({ notes, status: hasContent ? "completed" : "not_completed" }).eq("id",active.id);
    notify("Data Synced"); setActive(null); loadSystems();
  }

  const handleDeletePhoto = (photo) => {
    setConfirmData({
      title: "Delete Evidence?",
      msg: "Permanently remove this photo?",
      onConfirm: async () => {
        await supabase.storage.from("photos").remove([`${active.id}/${photo.name}`]);
        await loadPhotos(active.id);
        notify("Removed", "delete");
        setConfirmData(null);
      }
    });
  };

  async function createSystem(){
    if(!newId.trim()) return;
    await supabase.from("systems").insert([{ id:newId.trim(), description:desc, notes:"", status:"not_completed" }]);
    setShowAdd(false); setNewId(""); setDesc(""); loadSystems();
    notify("System Added!");
  }

  async function updateSystem() {
    if(!editTarget.id.trim()) return;
    await supabase.from("systems").update({ id: editTarget.id, description: editTarget.description }).eq("id", editTarget.originalId);
    setEditTarget(null); loadSystems(); notify("Updated!");
  }

  const handleDeleteSystem = () => {
    setConfirmData({
      title: "Delete Record?",
      msg: `Purge all data for ${editTarget.originalId}?`,
      onConfirm: async () => {
        await supabase.from("systems").delete().eq("id", editTarget.originalId);
        setEditTarget(null); loadSystems(); notify("Deleted", "delete"); setConfirmData(null);
      }
    });
  };

  const filtered = systems.filter(s => (s.id.toLowerCase().includes(search.toLowerCase()) || s.description.toLowerCase().includes(search.toLowerCase())) && (filter==="all" || s.status===filter));

  return (
    <div className="flex h-screen overflow-hidden bg-white">
      
      {toast && (
        <div className={`fixed top-5 right-5 z-[100] p-4 rounded-2xl shadow-2xl flex items-center gap-3 toast-in text-white font-bold
          ${toast.type === 'delete' ? 'bg-orange-500' : 'bg-red-600'}`}>
          <span>{toast.type === 'delete' ? '🗑️' : '✅'}</span>
          {toast.msg}
        </div>
      )}

      {confirmData && (
        <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
          <div className="bg-white p-8 rounded-3xl w-full max-w-xs shadow-2xl fade-in text-center">
            <h2 className="text-xl font-bold mb-2">{confirmData.title}</h2>
            <p className="text-sm text-gray-500 mb-6">{confirmData.msg}</p>
            <div className="flex flex-col gap-2">
              <button onClick={confirmData.onConfirm} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold hover:bg-red-700 transition">Confirm</button>
              <button onClick={() => setConfirmData(null)} className="w-full bg-gray-100 text-gray-700 py-3 rounded-2xl font-bold">Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* MOBILE HEADER */}
      <div className="lg:hidden fixed top-0 left-0 right-0 bg-white border-b-2 p-8 flex justify-between items-center z-20">
        <h1 className="font-black text-2xl text-red-600 tracking-tighter italic">STS QAQC</h1>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="text-3xl p-2">☰</button>
      </div>

      <div className={`${sidebarOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0 fixed lg:relative z-30 w-72 h-full bg-white border-r p-6 transition-transform duration-300`}>
        <h1 className="text-2xl font-bold text-red-600 mb-2 italic tracking-tight">STS QAQC</h1>
        <p className="text-[10px] text-gray-400 font-bold uppercase mb-4 truncate">{user.email}</p>
        <button onClick={()=>setShowAdd(true)} className="bg-red-600 text-white py-3 rounded-2xl font-semibold mb-6 w-full hover:bg-red-700 transition shadow-lg">+ NEW SYSTEM</button>
        <div className="flex flex-col gap-2 flex-1">
          <button onClick={()=>{setFilter("all"); setSidebarOpen(false);}} className="sidebarBtn"><span>🏢</span> Portfolio</button>
          <button onClick={()=>{setFilter("completed"); setSidebarOpen(false);}} className="sidebarBtn"><span>✅</span> Inspected</button>
          <button onClick={()=>{setFilter("not_completed"); setSidebarOpen(false);}} className="sidebarBtn"><span>🚧</span> Pending</button>
        </div>
        <button onClick={()=>supabase.auth.signOut()} className="mt-6 w-full py-3 border border-red-100 text-red-600 rounded-xl font-bold hover:bg-red-50 transition">Logout</button>
      </div>

      <div className="flex-1 p-6 lg:p-10 overflow-y-auto mt-40 lg:mt-0">
        <div className="relative mb-6">
          <input className="w-full border-2 p-4 pr-12 rounded-2xl shadow-sm focus:ring-2 focus:ring-red-500 outline-none transition-all font-medium"
            placeholder="Search systems..." value={search} onChange={e=>setSearch(e.target.value)} />
          {search && <button onClick={() => setSearch("")} className="absolute right-4 top-1/2 -translate-y-1/2 font-bold">✕</button>}
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          {filtered.map(s=>(
            <div key={s.id} className="relative group fade-in">
              <div onClick={()=>setActive(s)}
                className={`system-card cursor-pointer p-8 rounded-3xl border shadow-sm h-full transition-all
                ${s.status==="completed"?"bg-green-50 border-green-200":"bg-white border-slate-200"}`}>
                <h3 className="font-bold text-xl tracking-tight">{s.id}</h3>
                <p className="text-xs text-gray-500 font-semibold mt-2 uppercase">{s.description}</p>
              </div>
              <button onClick={(e) => { e.stopPropagation(); setEditTarget({ ...s, originalId: s.id }); }}
                className="absolute top-4 right-4 p-2 bg-white/90 border shadow-sm rounded-full text-gray-400 hover:text-red-600 lg:opacity-0 lg:group-hover:opacity-100 transition-all">
                <span>⚙️</span>
              </button>
            </div>
          ))}
        </div>
      </div>

      {active && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-40 backdrop-blur-sm">
          <div className="bg-white w-full max-w-3xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] fade-in overflow-hidden border-4 border-white">
            <div className="bg-red-600 text-white p-6 flex justify-between items-center">
                <h2 className="text-xl font-bold uppercase tracking-tighter italic">{active.id}</h2>
                <button onClick={generatePDF} className="bg-white text-red-600 px-5 py-2 rounded-xl text-[10px] font-black hover:bg-red-50 transition">EXPORT REPORT</button>
            </div>
            <div className="p-6 overflow-y-auto space-y-4 flex-1 bg-slate-50">
              <div className="relative">
                <textarea value={notes} onChange={e=>setNotes(e.target.value)}
                    className="w-full border-2 p-4 rounded-2xl h-40 focus:ring-2 focus:ring-red-500 outline-none font-medium" placeholder="Technical notes..." />
                <button onClick={startListening} 
                    className={`absolute bottom-3 right-3 p-3 rounded-full shadow-lg transition-all ${isListening ? 'bg-red-600 text-white animate-pulse' : 'bg-white text-gray-400'}`}>
                    🎤
                </button>
              </div>
              
              <div className="bg-white p-5 rounded-2xl border-2 border-dashed border-red-100">
                <p className="text-xs font-black text-red-600 mb-3 uppercase tracking-widest">Capture Evidence</p>
                <input id="file-upload" type="file" multiple className="text-xs font-bold" />
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {photos.map(p=>(
                  <div key={p.name} className="border rounded-2xl p-3 bg-white shadow-sm">
                    <img src={p.url} className="rounded-xl mb-2 object-cover w-full h-40" alt="Evidence"/>
                    <div className="flex justify-between items-center mt-2">
                        <p className="text-[9px] text-gray-400 font-bold uppercase">{p.timestamp}</p>
                        <button onClick={()=>handleDeletePhoto(p)} className="text-gray-300 hover:text-red-500">❌</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="p-6 bg-white border-t flex gap-3">
              <button onClick={()=>setActive(null)} className="flex-1 py-3 bg-gray-50 rounded-2xl text-xs font-black uppercase text-gray-400">Cancel</button>
              <button onClick={save} className="flex-1 py-3 bg-red-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-red-700">Save Progress</button>
            </div>
          </div>
        </div>
      )}

      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl fade-in border-b-8 border-red-600">
            <h2 className="text-xl font-bold mb-4 text-center italic uppercase">Add System</h2>
            <input className="w-full border p-4 rounded-2xl mb-3 text-center font-bold" placeholder="ID" value={newId} onChange={e=>setNewId(e.target.value)} />
            <input className="w-full border p-4 rounded-2xl mb-6 text-center" placeholder="Description" value={desc} onChange={e=>setDesc(e.target.value)} />
            <div className="flex gap-2">
                <button onClick={()=>setShowAdd(false)} className="flex-1 bg-gray-100 py-3 rounded-2xl font-bold text-xs uppercase">Abort</button>
                <button onClick={createSystem} className="flex-1 bg-red-600 text-white py-3 rounded-2xl font-bold text-xs uppercase">Add</button>
            </div>
          </div>
        </div>
      )}

      {editTarget && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl fade-in">
            <h2 className="text-xl font-bold mb-4 text-center text-red-600 italic">Edit Matrix</h2>
            <input className="w-full border p-4 rounded-2xl mb-3 font-bold text-center" value={editTarget.id} onChange={e=>setEditTarget({...editTarget, id: e.target.value})} />
            <input className="w-full border p-4 rounded-2xl mb-6 text-center" value={editTarget.description} onChange={e=>setEditTarget({...editTarget, description: e.target.value})} />
            <div className="space-y-3">
                <button onClick={updateSystem} className="w-full bg-red-600 text-white py-3 rounded-2xl font-black text-xs uppercase tracking-widest">Update</button>
                <button onClick={handleDeleteSystem} className="w-full bg-red-50 text-red-600 py-3 rounded-2xl font-black text-xs uppercase tracking-widest">Delete</button>
                <button onClick={()=>setEditTarget(null)} className="w-full text-gray-400 py-2 text-[10px] font-black uppercase">Cancel</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);
  useEffect(()=>{
    supabase.auth.getUser().then(r=>setUser(r.data.user));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return () => subscription.unsubscribe();
  },[]);
  return user?<Dashboard user={user}/>:<Auth onAuth={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
